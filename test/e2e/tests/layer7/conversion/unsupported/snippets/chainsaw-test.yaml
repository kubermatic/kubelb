apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ing-conversion-unsupported-snippets
  labels:
    suite: conversion
    layer: layer7
    conversion: "true"
    test: "conversion-unsupported-snippets"
    category: unsupported
    parallel: "true"
spec:
  description: |
    Test snippet annotations generate warnings but traffic works.
    NGINX snippets cannot be converted to Gateway API.
  bindings:
    - name: name
      value: conv-snippets
    - name: transformed_host
      value: conv-snippets.gateway.local
  steps:
    - name: create-service
      cluster: standalone
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: conv-snippets
                namespace: default
              spec:
                type: ClusterIP
                selector:
                  app: echo-shared
                ports:
                  - port: 80
                    targetPort: 5678
      catch:
        - use:
            template: ../../../../../step-templates/debug/collect-diagnostics.yaml

    - name: create-ingress
      cluster: standalone
      try:
        - apply:
            resource:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: conv-snippets
                namespace: default
                annotations:
                  nginx.ingress.kubernetes.io/server-snippet: |
                    location /custom { return 200 'custom'; }
                  nginx.ingress.kubernetes.io/configuration-snippet: |
                    add_header X-Custom-Header "value";
              spec:
                ingressClassName: nginx
                rules:
                  - host: conv-snippets.test.local
                    http:
                      paths:
                        - path: /
                          pathType: Prefix
                          backend:
                            service:
                              name: conv-snippets
                              port:
                                number: 80
      catch:
        - use:
            template: ../../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-httproute
      use:
        template: ../../../../../step-templates/conversion/verify-httproute.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
            - name: expected_host
              value: ($transformed_host)

    - name: verify-warning
      use:
        template: ../../../../../step-templates/conversion/verify-warnings.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
            - name: warning_pattern
              value: snippet

    - name: verify-status-partial
      use:
        template: ../../../../../step-templates/conversion/verify-status-annotation.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
            - name: expected_status
              value: partial

    - name: verify-basic-traffic
      use:
        template: ../../../../../step-templates/conversion/verify-http-traffic.yaml
        with:
          bindings:
            - name: host
              value: ($transformed_host)
            - name: expected_response
              value: hello-shared

    - name: cleanup
      use:
        template: ../../../../../step-templates/conversion/cleanup-conversion.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
