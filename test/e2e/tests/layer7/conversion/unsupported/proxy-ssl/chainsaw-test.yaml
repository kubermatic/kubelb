apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ing-conversion-unsupported-proxy-ssl
  labels:
    suite: conversion
    layer: layer7
    conversion: "true"
    test: "conversion-unsupported-proxy-ssl"
    category: unsupported
    parallel: "true"
spec:
  description: |
    Test proxy-ssl-secret annotation conversion.
    Backend TLS requires BackendTLSPolicy - verifies warning is generated.
  bindings:
    - name: name
      value: conv-proxy-ssl
    - name: transformed_host
      value: conv-proxyssl.gateway.local
  steps:
    - name: create-service
      cluster: standalone
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: conv-proxy-ssl
                namespace: default
              spec:
                type: ClusterIP
                selector:
                  app: echo-shared
                ports:
                  - port: 443
                    targetPort: 5678
      catch:
        - use:
            template: ../../../../../step-templates/debug/collect-diagnostics.yaml

    - name: create-ingress
      cluster: standalone
      try:
        - apply:
            resource:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: conv-proxy-ssl
                namespace: default
                annotations:
                  nginx.ingress.kubernetes.io/proxy-ssl-secret: "default/backend-tls"
              spec:
                ingressClassName: nginx
                rules:
                  - host: conv-proxyssl.test.local
                    http:
                      paths:
                        - path: /
                          pathType: Prefix
                          backend:
                            service:
                              name: conv-proxy-ssl
                              port:
                                number: 443
      catch:
        - use:
            template: ../../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-httproute
      use:
        template: ../../../../../step-templates/conversion/verify-httproute.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
            - name: expected_host
              value: ($transformed_host)

    - name: verify-warning
      use:
        template: ../../../../../step-templates/conversion/verify-warnings.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
            - name: warning_pattern
              value: "proxy-ssl"

    - name: cleanup
      use:
        template: ../../../../../step-templates/conversion/cleanup-conversion.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
