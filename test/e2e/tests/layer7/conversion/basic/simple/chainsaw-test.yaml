apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ing-conversion-basic-simple
  labels:
    suite: conversion
    layer: layer7
    conversion: "true"
    test: "conversion-basic-simple"
    category: basic
    parallel: "true"
spec:
  description: |
    Test basic Ingress-to-HTTPRoute conversion.
    Creates Ingress with nginx class, verifies HTTPRoute creation with domain transformation,
    tests HTTP connectivity via Envoy Gateway.
  bindings:
    - name: name
      value: conv-simple
    - name: original_host
      value: conv-simple.test.local
    - name: transformed_host
      value: conv-simple.gateway.local
  steps:
    - name: create-service
      cluster: standalone
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: conv-simple
                namespace: default
              spec:
                type: ClusterIP
                selector:
                  app: echo-shared
                ports:
                  - port: 80
                    targetPort: 5678
      catch:
        - use:
            template: ../../../../../step-templates/debug/collect-diagnostics.yaml

    - name: create-ingress
      cluster: standalone
      try:
        - apply:
            resource:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: conv-simple
                namespace: default
              spec:
                ingressClassName: nginx
                rules:
                  - host: conv-simple.test.local
                    http:
                      paths:
                        - path: /
                          pathType: Prefix
                          backend:
                            service:
                              name: conv-simple
                              port:
                                number: 80
      catch:
        - use:
            template: ../../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-httproute
      use:
        template: ../../../../../step-templates/conversion/verify-httproute.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
            - name: expected_host
              value: ($transformed_host)

    - name: verify-gateway
      use:
        template: ../../../../../step-templates/conversion/verify-gateway.yaml
        with:
          bindings:
            - name: gateway_name
              value: kubelb

    - name: verify-status
      use:
        template: ../../../../../step-templates/conversion/verify-status-annotation.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
            - name: expected_status
              value: converted

    - name: verify-http
      use:
        template: ../../../../../step-templates/conversion/verify-http-traffic.yaml
        with:
          bindings:
            - name: host
              value: ($transformed_host)
            - name: expected_response
              value: hello-shared

    - name: cleanup
      use:
        template: ../../../../../step-templates/conversion/cleanup-conversion.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
