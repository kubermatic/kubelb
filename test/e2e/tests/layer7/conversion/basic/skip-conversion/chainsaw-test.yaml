apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ing-conversion-basic-skip-conversion
  labels:
    suite: conversion
    layer: layer7
    conversion: "true"
    test: "conversion-basic-skip-conversion"
    category: basic
    parallel: "true"
spec:
  description: |
    Test skip-conversion annotation.
    Creates Ingress with skip-conversion=true, verifies no HTTPRoute created.
  bindings:
    - name: name
      value: conv-skip
  steps:
    - name: create-service
      cluster: standalone
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: conv-skip
                namespace: default
              spec:
                type: ClusterIP
                selector:
                  app: echo-shared
                ports:
                  - port: 80
                    targetPort: 5678

    - name: create-ingress
      cluster: standalone
      try:
        - apply:
            resource:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: conv-skip
                namespace: default
                annotations:
                  kubelb.k8c.io/skip-conversion: "true"
              spec:
                ingressClassName: nginx
                rules:
                  - host: conv-skip.test.local
                    http:
                      paths:
                        - path: /
                          pathType: Prefix
                          backend:
                            service:
                              name: conv-skip
                              port:
                                number: 80

    - name: verify-no-httproute
      cluster: standalone
      try:
        - script:
            timeout: 30s
            content: |
              set -e
              SOURCE_LABEL="conv-skip.default"

              sleep 10

              COUNT=$(kubectl get httproutes.gateway.networking.k8s.io -n default \
                -l "kubelb.k8c.io/source-ingress=${SOURCE_LABEL}" -o name 2>/dev/null | wc -l)

              if [ "$COUNT" -eq 0 ]; then
                exit 0
              fi

              echo "HTTPRoute was created despite skip-conversion=true"
              kubectl get httproutes.gateway.networking.k8s.io -n default \
                -l "kubelb.k8c.io/source-ingress=${SOURCE_LABEL}"
              exit 1
            check:
              ($error == null): true

    - name: verify-no-status
      cluster: standalone
      try:
        - script:
            timeout: 10s
            content: |
              set -e
              STATUS=$(kubectl get ingress conv-skip -n default \
                -o jsonpath='{.metadata.annotations.kubelb\.k8c\.io/conversion-status}' 2>/dev/null || echo "")

              if [ -z "$STATUS" ]; then
                exit 0
              fi

              echo "Found conversion-status='$STATUS'"
              exit 1
            check:
              ($error == null): true

    - name: cleanup
      cluster: standalone
      try:
        - script:
            timeout: 30s
            content: |
              kubectl delete ingress conv-skip -n default --ignore-not-found
              kubectl delete service conv-skip -n default --ignore-not-found
