apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ing-conversion-basic-default-backend
  labels:
    suite: conversion
    layer: layer7
    conversion: "true"
    category: basic
    test: conversion-default-backend
    parallel: "true"
spec:
  description: |
    Test Ingress default backend conversion.
    Creates Ingress with defaultBackend, verifies HTTPRoute has catch-all rule.
  bindings:
    - name: name
      value: conv-default-backend
    - name: transformed_host
      value: conv-default.gateway.local
  steps:
    - name: create-service
      cluster: standalone
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: conv-default-backend
                namespace: default
              spec:
                type: ClusterIP
                selector:
                  app: echo-shared
                ports:
                  - port: 80
                    targetPort: 5678
      catch:
        - use:
            template: ../../../../../step-templates/debug/collect-diagnostics.yaml

    - name: create-ingress
      cluster: standalone
      try:
        - apply:
            resource:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: conv-default-backend
                namespace: default
              spec:
                ingressClassName: nginx
                defaultBackend:
                  service:
                    name: conv-default-backend
                    port:
                      number: 80
                rules:
                  - host: conv-default.test.local
      catch:
        - use:
            template: ../../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-httproute
      use:
        template: ../../../../../step-templates/conversion/verify-httproute.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
            - name: expected_host
              value: ($transformed_host)

    - name: verify-status
      use:
        template: ../../../../../step-templates/conversion/verify-status-annotation.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
            - name: expected_status
              value: converted

    - name: verify-http
      use:
        template: ../../../../../step-templates/conversion/verify-http-traffic.yaml
        with:
          bindings:
            - name: host
              value: ($transformed_host)
            - name: slug_path
              value: /random/path
            - name: expected_response
              value: hello-shared

    - name: cleanup
      use:
        template: ../../../../../step-templates/conversion/cleanup-conversion.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
