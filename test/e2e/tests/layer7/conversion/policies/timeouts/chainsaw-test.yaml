apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ing-conversion-policies-timeouts
  labels:
    suite: conversion
    layer: layer7
    conversion: "true"
    test: "conversion-policies-timeouts"
    category: policies
    parallel: "true"
spec:
  description: |
    Test timeout annotations conversion.
    Gateway API requires BackendTrafficPolicy - warning generated.
    Verifies partial conversion and basic traffic works.
  bindings:
    - name: name
      value: conv-timeouts
    - name: transformed_host
      value: conv-timeouts.gateway.local
  steps:
    - name: create-service
      cluster: standalone
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: conv-timeouts
                namespace: default
              spec:
                type: ClusterIP
                selector:
                  app: echo-shared
                ports:
                  - port: 80
                    targetPort: 5678

    - name: create-ingress
      cluster: standalone
      try:
        - apply:
            resource:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: conv-timeouts
                namespace: default
                annotations:
                  nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
                  nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
                  nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
              spec:
                ingressClassName: nginx
                rules:
                  - host: conv-timeouts.test.local
                    http:
                      paths:
                        - path: /
                          pathType: Prefix
                          backend:
                            service:
                              name: conv-timeouts
                              port:
                                number: 80

    - name: verify-httproute
      use:
        template: ../../../../../step-templates/conversion/verify-httproute.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
            - name: expected_host
              value: ($transformed_host)

    - name: verify-backend-policy
      use:
        template: ../../../../../step-templates/conversion/verify-policy.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
            - name: policy_type
              value: backendtraffic
            - name: expected_field
              value: ".spec.timeout"

    - name: verify-timeout-enforcement
      try:
        - script:
            cluster: standalone
            timeout: 180s
            content: |
              set -e
              HOST="conv-timeouts.gateway.local"
              GATEWAY_NS=default

              IP=""
              i=1; while [ "$i" -le 30 ]; do
                IP=$(kubectl get gateway.gateway.networking.k8s.io kubelb -n "$GATEWAY_NS" \
                  -o jsonpath='{.status.addresses[0].value}' 2>/dev/null || echo "")
                if [ -n "$IP" ]; then
                  break
                fi
                sleep 2
                i=$((i + 1))
              done

              if [ -z "$IP" ]; then
                echo "Gateway has no IP"
                exit 1
              fi

              echo "Gateway IP: $IP"

              i=1; while [ "$i" -le 20 ]; do
                CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
                  -H "Host: ${HOST}" "http://${IP}/" 2>/dev/null || echo "000")
                if [ "$CODE" = "200" ]; then
                  break
                fi
                sleep 3
                i=$((i + 1))
              done

              FAST_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                -H "Host: ${HOST}" "http://${IP}/" 2>/dev/null || echo "000")

              echo "Fast request response: $FAST_CODE"

              HTTPROUTE=$(kubectl get httproutes.gateway.networking.k8s.io -n default \
                -l "kubelb.k8c.io/source-ingress=conv-timeouts.default" \
                -o name 2>/dev/null | head -1 || echo "")

              if [ -n "$HTTPROUTE" ]; then
                TIMEOUT_CONFIG=$(kubectl get "$HTTPROUTE" -n default \
                  -o jsonpath='{.spec.rules[*].timeouts}' 2>/dev/null || echo "")
                if [ -n "$TIMEOUT_CONFIG" ] && [ "$TIMEOUT_CONFIG" != "{}" ]; then
                  echo "HTTPRoute timeout configuration: $TIMEOUT_CONFIG"
                else
                  echo "HTTPRoute has no timeout configuration"
                  echo "Timeout settings may require BackendTrafficPolicy CRD"
                fi
              fi

              if [ "$FAST_CODE" = "200" ]; then
                echo "Fast request completed within timeout"
                echo "Note: Full timeout testing requires slow backend service"
                exit 0
              fi

              echo "Fast request did not succeed (got $FAST_CODE)"
              exit 1
            check:
              ($error == null): true

    - name: cleanup
      use:
        template: ../../../../../step-templates/conversion/cleanup-conversion.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
