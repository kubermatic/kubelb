apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ing-conversion-policies-body-size
  labels:
    suite: conversion
    layer: layer7
    conversion: "true"
    test: "conversion-policies-body-size"
    category: policies
    parallel: "true"
spec:
  description: |
    Test proxy-body-size annotation conversion.
    Gateway API requires ClientTrafficPolicy - warning generated.
    Verifies partial conversion and basic traffic works.
  bindings:
    - name: name
      value: conv-bodysize
    - name: transformed_host
      value: conv-bodysize.gateway.local
  steps:
    - name: create-service
      cluster: standalone
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: conv-bodysize
                namespace: default
              spec:
                type: ClusterIP
                selector:
                  app: echo-shared
                ports:
                  - port: 80
                    targetPort: 5678

    - name: create-ingress
      cluster: standalone
      try:
        - apply:
            resource:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: conv-bodysize
                namespace: default
                annotations:
                  nginx.ingress.kubernetes.io/proxy-body-size: "10m"
              spec:
                ingressClassName: nginx
                rules:
                  - host: conv-bodysize.test.local
                    http:
                      paths:
                        - path: /
                          pathType: Prefix
                          backend:
                            service:
                              name: conv-bodysize
                              port:
                                number: 80

    - name: verify-httproute
      use:
        template: ../../../../../step-templates/conversion/verify-httproute.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
            - name: expected_host
              value: ($transformed_host)

    - name: verify-warning
      use:
        template: ../../../../../step-templates/conversion/verify-warnings.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
            - name: warning_pattern
              value: ClientTrafficPolicy

    - name: verify-body-size-enforcement
      try:
        - script:
            cluster: standalone
            timeout: 120s
            content: |
              set -e
              HOST="conv-bodysize.gateway.local"
              GATEWAY_NS=default

              IP=""
              i=1; while [ "$i" -le 30 ]; do
                IP=$(kubectl get gateway.gateway.networking.k8s.io kubelb -n "$GATEWAY_NS" \
                  -o jsonpath='{.status.addresses[0].value}' 2>/dev/null || echo "")
                if [ -n "$IP" ]; then
                  break
                fi
                sleep 2
                i=$((i + 1))
              done

              if [ -z "$IP" ]; then
                echo "Gateway has no IP"
                exit 1
              fi

              echo "Gateway IP: $IP"

              i=1; while [ "$i" -le 20 ]; do
                CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
                  -H "Host: ${HOST}" "http://${IP}/" 2>/dev/null || echo "000")
                if [ "$CODE" = "200" ]; then
                  break
                fi
                sleep 3
                i=$((i + 1))
              done

              SMALL_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                -H "Host: ${HOST}" \
                -X POST -d "small payload" \
                "http://${IP}/" 2>/dev/null || echo "000")

              echo "Small POST response: $SMALL_CODE"

              LARGE_CODE=$(dd if=/dev/zero bs=1M count=15 2>/dev/null | \
                curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
                -H "Host: ${HOST}" \
                -H "Content-Type: application/octet-stream" \
                -X POST --data-binary @- \
                "http://${IP}/" 2>/dev/null || echo "000")

              echo "Large POST (15MB) response: $LARGE_CODE"

              if [ "$SMALL_CODE" = "200" ] && [ "$LARGE_CODE" = "413" ]; then
                exit 0
              fi

              if [ "$SMALL_CODE" = "200" ]; then
                exit 0
              fi

              echo "Basic traffic not working"
              exit 1
            check:
              ($error == null): true

    - name: cleanup
      use:
        template: ../../../../../step-templates/conversion/cleanup-conversion.yaml
        with:
          bindings:
            - name: ingress_name
              value: ($name)
