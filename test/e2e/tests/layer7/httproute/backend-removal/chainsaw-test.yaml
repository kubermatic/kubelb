# HTTPRoute Backend Removal Test
# Verifies:
# - HTTPRoute with multiple backends creates services in management cluster
# - Removing a backend from HTTPRoute removes the service from Route spec, status,
#   and the generated service from the management cluster
# - Remaining backend continues to work
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: backend-removal
  labels:
    all:
    test: backend-removal
    resource: httproute
    layer: layer7
spec:
  description: |
    Test that removing a backendRef from an HTTPRoute properly cleans up
    the orphaned service from Route spec, Route status, and the management cluster.
  steps:
    - name: deploy-backends
      description: Deploy three backend services (two ClusterIP, one NodePort)
      cluster: tenant1
      try:
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: removal-svc-a
                namespace: default
                labels: {app: removal-svc-a}
              spec:
                replicas: 1
                selector:
                  matchLabels: {app: removal-svc-a}
                template:
                  metadata:
                    labels: {app: removal-svc-a}
                  spec:
                    containers:
                      - name: echo
                        image: hashicorp/http-echo:1.0
                        imagePullPolicy: IfNotPresent
                        args: ["-text=svc-a", "-listen=:8080"]
                        ports: [{containerPort: 8080}]
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: removal-svc-b
                namespace: default
                labels: {app: removal-svc-b}
              spec:
                replicas: 1
                selector:
                  matchLabels: {app: removal-svc-b}
                template:
                  metadata:
                    labels: {app: removal-svc-b}
                  spec:
                    containers:
                      - name: echo
                        image: hashicorp/http-echo:1.0
                        imagePullPolicy: IfNotPresent
                        args: ["-text=svc-b", "-listen=:8080"]
                        ports: [{containerPort: 8080}]
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: removal-svc-c
                namespace: default
                labels: {app: removal-svc-c}
              spec:
                replicas: 1
                selector:
                  matchLabels: {app: removal-svc-c}
                template:
                  metadata:
                    labels: {app: removal-svc-c}
                  spec:
                    containers:
                      - name: echo
                        image: hashicorp/http-echo:1.0
                        imagePullPolicy: IfNotPresent
                        args: ["-text=svc-c", "-listen=:8080"]
                        ports: [{containerPort: 8080}]
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: removal-svc-a
                namespace: default
              spec:
                type: ClusterIP
                selector: {app: removal-svc-a}
                ports: [{port: 80, targetPort: 8080}]
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: removal-svc-b
                namespace: default
              spec:
                type: NodePort
                selector: {app: removal-svc-b}
                ports: [{port: 80, targetPort: 8080}]
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: removal-svc-c
                namespace: default
              spec:
                type: ClusterIP
                selector: {app: removal-svc-c}
                ports: [{port: 80, targetPort: 8080}]
        - assert:
            timeout: 60s
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata: {name: removal-svc-a, namespace: default}
              status: {readyReplicas: 1}
        - assert:
            timeout: 60s
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata: {name: removal-svc-b, namespace: default}
              status: {readyReplicas: 1}
        - assert:
            timeout: 60s
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata: {name: removal-svc-c, namespace: default}
              status: {readyReplicas: 1}

    - name: create-gateway
      use:
        template: ../../../../step-templates/gateway/create-http-gateway.yaml
        with:
          bindings:
            - name: gateway_name
              value: removal-gw

    - name: create-httproute-three-backends
      description: Create HTTPRoute with three path rules
      cluster: tenant1
      try:
        - script:
            skipCommandOutput: true
            timeout: 60s
            content: |
              set -e
              IP=$(kubectl get gateway removal-gw -n default \
                -o jsonpath='{.status.addresses[0].value}')
              HOST="removal.${IP}.nip.io"
              cat <<EOF | kubectl apply -f -
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                name: removal-route
                namespace: default
              spec:
                parentRefs:
                  - name: removal-gw
                hostnames:
                  - "${HOST}"
                rules:
                  - backendRefs:
                      - name: removal-svc-a
                        port: 80
                    matches:
                      - path:
                          type: PathPrefix
                          value: /a
                  - backendRefs:
                      - name: removal-svc-b
                        port: 80
                    matches:
                      - path:
                          type: PathPrefix
                          value: /b
                  - backendRefs:
                      - name: removal-svc-c
                        port: 80
                    matches:
                      - path:
                          type: PathPrefix
                          value: /c
              EOF
            check:
              ($error == null): true

    - name: verify-three-services-exist
      description: All three generated services exist in management cluster
      cluster: kubelb
      try:
        - script:
            timeout: 90s
            content: |
              set -e
              NAMESPACE="tenant-primary"
              ROUTE="removal-route"

              for i in $(seq 1 30); do
                SVC_A=$(kubectl get svc "default-${ROUTE}-removal-svc-a" -n "$NAMESPACE" --no-headers 2>/dev/null || true)
                SVC_B=$(kubectl get svc "default-${ROUTE}-removal-svc-b" -n "$NAMESPACE" --no-headers 2>/dev/null || true)
                SVC_C=$(kubectl get svc "default-${ROUTE}-removal-svc-c" -n "$NAMESPACE" --no-headers 2>/dev/null || true)

                if [ -n "$SVC_A" ] && [ -n "$SVC_B" ] && [ -n "$SVC_C" ]; then
                  echo "All three services exist"
                  kubectl get svc -n "$NAMESPACE" | grep "removal"
                  exit 0
                fi
                echo "Attempt $i: waiting for all services..."
                sleep 2
              done
              echo "FAILED: Not all services created"
              kubectl get svc -n "$NAMESPACE" | grep "removal" || true
              exit 1
            check:
              ($error == null): true

    - name: verify-route-has-three-services
      description: Route spec and status contain all three services
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              NAMESPACE="tenant-primary"

              ROUTE=$(kubectl get routes.kubelb.k8c.io -n "$NAMESPACE" \
                -l kubelb.k8c.io/origin-name=removal-route -o name 2>/dev/null | head -1)
              if [ -z "$ROUTE" ]; then
                echo "FAILED: Route CRD not found"
                exit 1
              fi

              SPEC_SVC_COUNT=$(kubectl get $ROUTE -n "$NAMESPACE" \
                -o jsonpath='{.spec.source.kubernetes.services}' | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())))")
              echo "Services in Route spec: $SPEC_SVC_COUNT"

              STATUS_SVC_COUNT=$(kubectl get $ROUTE -n "$NAMESPACE" \
                -o json | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(len(d.get('status',{}).get('resources',{}).get('services',{})))")
              echo "Services in Route status: $STATUS_SVC_COUNT"

              if [ "$SPEC_SVC_COUNT" -ne 3 ]; then
                echo "FAILED: Expected 3 services in spec, got $SPEC_SVC_COUNT"
                exit 1
              fi
              if [ "$STATUS_SVC_COUNT" -ne 3 ]; then
                echo "FAILED: Expected 3 services in status, got $STATUS_SVC_COUNT"
                exit 1
              fi
              echo "PASS: Route has 3 services in spec and status"
            check:
              ($error == null): true

    - name: remove-backend-b
      description: Update HTTPRoute to remove svc-b backend
      cluster: tenant1
      try:
        - script:
            skipCommandOutput: true
            timeout: 60s
            content: |
              set -e
              IP=$(kubectl get gateway removal-gw -n default \
                -o jsonpath='{.status.addresses[0].value}')
              HOST="removal.${IP}.nip.io"
              cat <<EOF | kubectl apply -f -
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                name: removal-route
                namespace: default
              spec:
                parentRefs:
                  - name: removal-gw
                hostnames:
                  - "${HOST}"
                rules:
                  - backendRefs:
                      - name: removal-svc-a
                        port: 80
                    matches:
                      - path:
                          type: PathPrefix
                          value: /a
                  - backendRefs:
                      - name: removal-svc-c
                        port: 80
                    matches:
                      - path:
                          type: PathPrefix
                          value: /c
              EOF
              echo "Updated HTTPRoute: removed svc-b backend"
            check:
              ($error == null): true

    - name: verify-svc-b-removed-from-management
      description: Generated service for svc-b is deleted from management cluster
      cluster: kubelb
      try:
        - script:
            timeout: 90s
            content: |
              set -e
              NAMESPACE="tenant-primary"
              ROUTE="removal-route"

              for i in $(seq 1 30); do
                SVC_B=$(kubectl get svc "default-${ROUTE}-removal-svc-b" -n "$NAMESPACE" --no-headers 2>/dev/null || true)
                if [ -z "$SVC_B" ]; then
                  echo "Service default-${ROUTE}-removal-svc-b removed"

                  # Verify remaining services still exist
                  SVC_A=$(kubectl get svc "default-${ROUTE}-removal-svc-a" -n "$NAMESPACE" --no-headers 2>/dev/null || true)
                  SVC_C=$(kubectl get svc "default-${ROUTE}-removal-svc-c" -n "$NAMESPACE" --no-headers 2>/dev/null || true)
                  if [ -z "$SVC_A" ] || [ -z "$SVC_C" ]; then
                    echo "FAILED: Remaining services were also removed"
                    kubectl get svc -n "$NAMESPACE" | grep "removal" || true
                    exit 1
                  fi

                  echo "Remaining services intact:"
                  kubectl get svc -n "$NAMESPACE" | grep "removal"
                  exit 0
                fi
                echo "Attempt $i: waiting for svc-b removal..."
                sleep 2
              done
              echo "FAILED: Service svc-b not removed"
              kubectl get svc -n "$NAMESPACE" | grep "removal" || true
              exit 1
            check:
              ($error == null): true

    - name: verify-route-has-two-services
      description: Route spec and status contain only two services after removal
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              NAMESPACE="tenant-primary"

              ROUTE=$(kubectl get routes.kubelb.k8c.io -n "$NAMESPACE" \
                -l kubelb.k8c.io/origin-name=removal-route -o name 2>/dev/null | head -1)
              if [ -z "$ROUTE" ]; then
                echo "FAILED: Route CRD not found"
                exit 1
              fi

              SPEC_SVC_COUNT=$(kubectl get $ROUTE -n "$NAMESPACE" \
                -o jsonpath='{.spec.source.kubernetes.services}' | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())))")
              echo "Services in Route spec: $SPEC_SVC_COUNT"

              STATUS_SVC_COUNT=$(kubectl get $ROUTE -n "$NAMESPACE" \
                -o json | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(len(d.get('status',{}).get('resources',{}).get('services',{})))")
              echo "Services in Route status: $STATUS_SVC_COUNT"

              # Check svc-b is not in status keys
              SVC_B_IN_STATUS=$(kubectl get $ROUTE -n "$NAMESPACE" \
                -o json | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); keys=list(d.get('status',{}).get('resources',{}).get('services',{}).keys()); print('removal-svc-b' in ' '.join(keys))")

              if [ "$SPEC_SVC_COUNT" -ne 2 ]; then
                echo "FAILED: Expected 2 services in spec, got $SPEC_SVC_COUNT"
                exit 1
              fi
              if [ "$STATUS_SVC_COUNT" -ne 2 ]; then
                echo "FAILED: Expected 2 services in status, got $STATUS_SVC_COUNT"
                exit 1
              fi
              if [ "$SVC_B_IN_STATUS" = "True" ]; then
                echo "FAILED: svc-b still present in Route status"
                exit 1
              fi
              echo "PASS: Route has 2 services, svc-b removed from spec and status"
            check:
              ($error == null): true

    - name: verify-no-storm-after-removal
      description: No reconciliation storm after backend removal
      cluster: tenant1
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              CCM_POD=$(kubectl get pods -n kubelb -o jsonpath='{.items[0].metadata.name}')

              COUNT_BEFORE=$(kubectl logs -n kubelb "$CCM_POD" -c ccm 2>&1 | grep -c "Reconciling HTTPRoute.*removal-route" || true)
              sleep 15
              COUNT_AFTER=$(kubectl logs -n kubelb "$CCM_POD" -c ccm 2>&1 | grep -c "Reconciling HTTPRoute.*removal-route" || true)

              DELTA=$((COUNT_AFTER - COUNT_BEFORE))
              echo "Reconciliations in 15s window: $DELTA"

              if [ "$DELTA" -gt 5 ]; then
                echo "FAILED: Reconciliation storm detected after backend removal"
                exit 1
              fi
              echo "PASS: No reconciliation storm"
            check:
              ($error == null): true

    - name: cleanup
      cluster: tenant1
      try:
        - script:
            skipCommandOutput: true
            timeout: 60s
            content: |
              kubectl delete httproute removal-route -n default --wait=false
              echo "Cleanup initiated"
            check:
              ($error == null): true
      finally:
        - script:
            skipCommandOutput: true
            cluster: tenant1
            timeout: 60s
            content: |
              kubectl delete httproute/removal-route gateway/removal-gw -n default --ignore-not-found
              kubectl delete deployment/removal-svc-a deployment/removal-svc-b deployment/removal-svc-c -n default --ignore-not-found
              kubectl delete service/removal-svc-a service/removal-svc-b service/removal-svc-c -n default --ignore-not-found

    - name: verify-cleanup
      use:
        template: ../../../../step-templates/common/verify-route-cleanup.yaml
        with:
          bindings:
            - name: resource_name
              value: removal-route
            - name: kubelb_namespace
              value: tenant-primary
