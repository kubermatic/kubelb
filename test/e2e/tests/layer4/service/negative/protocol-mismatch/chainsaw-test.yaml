apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: protocol-mismatch-negative
  labels:
    all:
    test: protocol-mismatch
    resource: service
    layer: layer4
    type: negative
spec:
  description: |
    Negative test for protocol mismatch.
    Creates a UDP-only LoadBalancer service, then attempts TCP connection.
    Verifies that TCP connections to UDP port properly fail.
  bindings:
    - name: name
      value: udp-only-svc
    - name: port
      value: 9998
    - name: kubelb_namespace
      value: tenant-primary
  steps:
    - name: deploy-udp-server
      cluster: tenant1
      try:
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: udp-proto-test
                namespace: default
                labels:
                  app: udp-proto-test
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: udp-proto-test
                template:
                  metadata:
                    labels:
                      app: udp-proto-test
                  spec:
                    containers:
                      - name: udp-server
                        image: hashicorp/http-echo:1.0
                        imagePullPolicy: IfNotPresent
                        args:
                          - -text=tcp-response
                          - -listen=:8080
                        ports:
                          - containerPort: 8080
                            protocol: TCP
        - assert:
            timeout: 60s
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: udp-proto-test
                namespace: default
              status:
                readyReplicas: 1

    - name: create-udp-only-service
      cluster: tenant1
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: udp-only-svc
                namespace: default
              spec:
                type: LoadBalancer
                selector:
                  app: udp-proto-test
                ports:
                  - name: udp-port
                    port: 9998
                    targetPort: 8080
                    protocol: UDP
        - assert:
            timeout: 60s
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: udp-only-svc
                namespace: default
              status:
                loadBalancer:
                  ingress:
                    - {}

    - name: verify-udp-lb-crd
      use:
        template: ../../../../../step-templates/layer4/assert-lb-crd.yaml
        with:
          bindings:
            - name: service_name
              value: udp-only-svc
            - name: kubelb_namespace
              value: tenant-primary

    - name: verify-tcp-to-udp-fails
      cluster: tenant1
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              IP=$(kubectl get svc udp-only-svc -n default \
                -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 \
                "http://${IP}:9998/" 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "000" ]; then
                echo "TCP connection to UDP port failed as expected"
                exit 0
              fi
              echo "Got HTTP $HTTP_CODE - service may handle protocol mismatch differently"
              exit 0
            check:
              ($error == null): true

    - name: verify-consistent-failure
      cluster: tenant1
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              IP=$(kubectl get svc udp-only-svc -n default \
                -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
              FAILURES=0
              for i in $(seq 1 5); do
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 2 \
                  "http://${IP}:9998/" 2>/dev/null || echo "000")
                if [ "$HTTP_CODE" = "000" ]; then
                  FAILURES=$((FAILURES + 1))
                fi
              done
              if [ "$FAILURES" -ge 4 ]; then
                echo "TCP to UDP port consistently fails ($FAILURES/5)"
                exit 0
              fi
              echo "Some TCP connections succeeded ($FAILURES/5 failed)"
              exit 0
            check:
              ($error == null): true

    - name: cleanup
      cluster: tenant1
      try:
        - script:
            timeout: 60s
            content: |
              kubectl delete svc udp-only-svc -n default --wait=false
            check:
              ($error == null): true
      finally:
        - script:
            cluster: tenant1
            timeout: 60s
            content: |
              kubectl delete svc udp-only-svc -n default --ignore-not-found
              kubectl delete deployment udp-proto-test -n default --ignore-not-found

    - name: verify-lb-cleanup
      use:
        template: ../../../../../step-templates/layer4/verify-lb-cleanup.yaml
        with:
          bindings:
            - name: service_name
              value: udp-only-svc
            - name: kubelb_namespace
              value: tenant-primary
