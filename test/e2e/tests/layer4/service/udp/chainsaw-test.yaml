apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: udp-service-loadbalancer
  labels:
    all:
    test: udp
    resource: service
    layer: layer4
    protocol: udp
spec:
  description: |
    Test UDP LoadBalancer service provisioning.
    Deploys UDP echo server on tenant1, creates UDP LoadBalancer service,
    verifies LoadBalancer CRD in kubelb cluster, and tests UDP connectivity.
  bindings:
    - name: name
      value: udp-echo
    - name: port
      value: 9999
    - name: kubelb_namespace
      value: tenant-primary
  steps:
    - name: deploy-udp-server
      cluster: tenant1
      try:
        - apply:
            file: ../../../../testdata/deployments/udp-echo.yaml
        - assert:
            timeout: 60s
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ($name)
                namespace: default
              status:
                readyReplicas: 1

    - name: create-udp-loadbalancer-service
      cluster: tenant1
      try:
        - apply:
            file: ../../../../testdata/services/udp-lb.yaml
        - assert:
            timeout: 60s
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: ($name)
                namespace: default
              spec:
                ports:
                  - protocol: UDP
              status:
                loadBalancer:
                  ingress:
                    - {}

    - name: verify-loadbalancer-crd
      use:
        template: ../../../../step-templates/layer4/assert-lb-crd.yaml
        with:
          bindings:
            - name: service_name
              value: udp-echo
            - name: kubelb_namespace
              value: tenant-primary
            - name: expected_protocol
              value: UDP
            - name: expected_port
              value: 9999

    - name: verify-status-propagation
      use:
        template: ../../../../step-templates/layer4/verify-status-propagation.yaml
        with:
          bindings:
            - name: service_name
              value: udp-echo
            - name: tenant
              value: tenant1
            - name: kubelb_namespace
              value: tenant-primary

    - name: verify-udp-connectivity
      cluster: tenant1
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              IP=$(kubectl get svc udp-echo -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
              for i in $(seq 1 10); do
                RESPONSE=$(curl -s --max-time 10 "tftp://$IP:9999/hello" 2>/dev/null || true)
                if [ -n "$RESPONSE" ]; then
                  echo "UDP response received"
                  exit 0
                fi
                sleep 2
              done
              echo "No UDP response after 10 attempts"
              exit 1
            check:
              ($error == null): true
