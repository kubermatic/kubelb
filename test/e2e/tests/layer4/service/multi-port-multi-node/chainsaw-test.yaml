apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: multi-port-multi-node-service-loadbalancer
  labels:
    all:
    test: multi-port-multi-node
    resource: service
    layer: layer4
spec:
  description: |
    Test multi-port LoadBalancer with multiple backend replicas.
    Deploys multi-echo server with 3 replicas and 2 ports,
    verifies all endpoints are synced and each port returns correct message.
  bindings:
    - name: name
      value: echo-mpmnod
    - name: message1
      value: "hello-from-mpmnod-port-80"
    - name: message2
      value: "hello-from-mpmnod-port-81"
    - name: port1
      value: 80
    - name: port2
      value: 81
    - name: replicas
      value: 3
    - name: kubelb_namespace
      value: tenant-primary
  steps:
    - name: deploy-multi-echo-replicas
      cluster: tenant1
      try:
        - apply:
            file: ../../../../testdata/deployments/multi-echo-replicas.yaml
        - assert:
            timeout: 60s
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ($name)
                namespace: default
              status:
                readyReplicas: ($replicas)
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: create-multiport-loadbalancer
      cluster: tenant1
      try:
        - apply:
            file: ../../../../testdata/services/multi-echo-lb.yaml
        - assert:
            timeout: 60s
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: ($name)
                namespace: default
              status:
                loadBalancer:
                  ingress:
                    - {}
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-loadbalancer-crd
      use:
        template: ../../../../step-templates/layer4/assert-lb-crd.yaml
        with:
          bindings:
            - name: service_name
              value: echo-mpmnod
            - name: kubelb_namespace
              value: tenant-primary
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-status-propagation
      use:
        template: ../../../../step-templates/layer4/verify-status-propagation.yaml
        with:
          bindings:
            - name: service_name
              value: echo-mpmnod
            - name: tenant
              value: tenant1
            - name: kubelb_namespace
              value: tenant-primary

    - name: verify-port1-response
      use:
        template: ../../../../step-templates/layer4/verify-http-response.yaml
        with:
          bindings:
            - name: service_name
              value: echo-mpmnod
            - name: expected
              value: "hello-from-mpmnod-port-80"
            - name: port
              value: "80"
            - name: tenant
              value: tenant1

    - name: verify-port2-response
      use:
        template: ../../../../step-templates/layer4/verify-http-response.yaml
        with:
          bindings:
            - name: service_name
              value: echo-mpmnod
            - name: expected
              value: "hello-from-mpmnod-port-81"
            - name: port
              value: "81"
            - name: tenant
              value: tenant1

    - name: verify-multiple-requests-both-ports
      cluster: tenant1
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              IP=$(kubectl get svc echo-mpmnod -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
              SUCCESS_PORT1=0
              SUCCESS_PORT2=0

              for i in $(seq 1 10); do
                RESPONSE=$(curl -s --max-time 5 "http://${IP}:80" || true)
                if echo "$RESPONSE" | grep -q "hello-from-mpmnod-port-80"; then
                  SUCCESS_PORT1=$((SUCCESS_PORT1 + 1))
                fi
              done

              for i in $(seq 1 10); do
                RESPONSE=$(curl -s --max-time 5 "http://${IP}:81" || true)
                if echo "$RESPONSE" | grep -q "hello-from-mpmnod-port-81"; then
                  SUCCESS_PORT2=$((SUCCESS_PORT2 + 1))
                fi
              done

              if [ "$SUCCESS_PORT1" -eq 10 ] && [ "$SUCCESS_PORT2" -eq 10 ]; then
                echo "All requests on both ports succeeded"
                exit 0
              fi
              echo "Port 80: $SUCCESS_PORT1/10, Port 81: $SUCCESS_PORT2/10"
              exit 1
            check:
              ($error == null): true
