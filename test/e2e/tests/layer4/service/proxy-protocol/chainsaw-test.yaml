apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: proxy-protocol-ip-preservation
  labels:
    all:
    test: proxy-protocol
    resource: service
    layer: layer4
    type: ip-preservation
spec:
  description: |
    Test IP preservation with Proxy Protocol v2.
    Scenario 1 (negative): ETP:Local without PP — backend sees envoy node IP, not client IP.
    Scenario 2 (positive): ETP:Local with PP v2 — backend receives real client IP in PP header.
    Also verifies ETP propagation through the full chain.
  bindings:
    - name: kubelb_namespace
      value: tenant-primary
    - name: neg_service_name
      value: echo-pp-neg
    - name: pos_service_name
      value: nginx-pp-test
  steps:
    # Scenario 1 (Negative): ETP:Local, no Proxy Protocol
    - name: create-negative-service
      cluster: tenant1
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: ($neg_service_name)
                namespace: default
              spec:
                type: LoadBalancer
                externalTrafficPolicy: Local
                selector:
                  app: echo-headers
                ports:
                  - port: 8080
                    targetPort: 80
        - assert:
            timeout: 60s
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: ($neg_service_name)
                namespace: default
              status:
                loadBalancer:
                  ingress:
                    - {}
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-etp-on-crd
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            env:
              - name: LB_NS
                value: ($kubelb_namespace)
              - name: SERVICE_NAME
                value: ($neg_service_name)
            content: |
              set -e
              for i in $(seq 1 15); do
                LB=$(kubectl get loadbalancers.kubelb.k8c.io -n "$LB_NS" \
                  -l kubelb.k8c.io/origin-name="$SERVICE_NAME" -o name 2>/dev/null | head -1)
                if [ -n "$LB" ]; then
                  ETP=$(kubectl get $LB -n "$LB_NS" -o jsonpath='{.spec.externalTrafficPolicy}')
                  if [ "$ETP" = "Local" ]; then
                    echo "LB CRD has externalTrafficPolicy=Local"
                    exit 0
                  fi
                  echo "Expected ETP=Local, got '$ETP'"
                  exit 1
                fi
                sleep 2
              done
              echo "LB CRD not found"
              exit 1
            check:
              ($error == null): true
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-etp-on-envoy-svc
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            env:
              - name: LB_NS
                value: ($kubelb_namespace)
              - name: SERVICE_NAME
                value: ($neg_service_name)
            content: |
              set -e
              for i in $(seq 1 15); do
                LB=$(kubectl get loadbalancers.kubelb.k8c.io -n "$LB_NS" \
                  -l kubelb.k8c.io/origin-name="$SERVICE_NAME" -o name 2>/dev/null | head -1)
                if [ -z "$LB" ]; then
                  sleep 2
                  continue
                fi
                LB_NAME=$(echo "$LB" | sed 's|loadbalancer.kubelb.k8c.io/||')
                SVC_NAME="envoy-${LB_NAME}"
                ETP=$(kubectl get svc "$SVC_NAME" -n "$LB_NS" -o jsonpath='{.spec.externalTrafficPolicy}' 2>/dev/null || true)
                if [ "$ETP" = "Local" ]; then
                  echo "Envoy service has externalTrafficPolicy=Local"
                  exit 0
                fi
                sleep 2
              done
              echo "Envoy service does not have ETP=Local"
              exit 1
            check:
              ($error == null): true
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-no-client-ip-without-pp
      try:
        - script:
            timeout: 120s
            env:
              - name: SERVICE_NAME
                value: ($neg_service_name)
            content: |
              set -e
              ROOT_DIR="$(git rev-parse --show-toplevel)"
              KUBECONFIGS_DIR="${ROOT_DIR}/.e2e-kubeconfigs"

              IP=$(KUBECONFIG="${KUBECONFIGS_DIR}/tenant1.kubeconfig" \
                kubectl get svc "$SERVICE_NAME" -n default \
                -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

              EXPECTED_CLIENT_IP=$(docker exec kubelb-control-plane ip -4 route \
                | awk '/default/ {print $3}')
              if [ -z "$EXPECTED_CLIENT_IP" ]; then
                EXPECTED_CLIENT_IP=$(docker network inspect kind \
                  -f '{{range .IPAM.Config}}{{if .Gateway}}{{.Gateway}} {{end}}{{end}}' \
                  | tr ' ' '\n' | grep -v ':' | head -1)
              fi
              if [ -z "$EXPECTED_CLIENT_IP" ]; then
                echo "Could not determine client IP"
                exit 1
              fi

              for i in $(seq 1 30); do
                RESPONSE=$(curl -s --max-time 5 "http://${IP}:8080/" || true)
                if [ -n "$RESPONSE" ]; then
                  break
                fi
                sleep 3
              done
              if [ -z "$RESPONSE" ]; then
                echo "Service never became reachable"
                exit 1
              fi

              for i in $(seq 1 5); do
                RESPONSE=$(curl -s --max-time 5 "http://${IP}:8080/" || true)
                SEEN_IP=$(echo "$RESPONSE" | jq -r '.host.ip' 2>/dev/null || true)
                SEEN_IP=$(echo "$SEEN_IP" | sed 's/^::ffff://')

                if [ -n "$SEEN_IP" ] && [ "$SEEN_IP" != "null" ]; then
                  if [ "$SEEN_IP" = "$EXPECTED_CLIENT_IP" ]; then
                    echo "Backend sees real client IP ($SEEN_IP) — should be SNAT'd without PP"
                    exit 1
                  fi
                  echo "Backend sees internal IP ($SEEN_IP), not client IP ($EXPECTED_CLIENT_IP) — SNAT working"
                  exit 0
                fi
                sleep 2
              done
              echo "Could not verify IP behavior"
              exit 1
            check:
              ($error == null): true
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    # Scenario 2 (Positive): ETP:Local + Proxy Protocol v2
    - name: deploy-nginx-pp-backend
      cluster: tenant1
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: nginx-pp-test
                namespace: default
              data:
                default.conf: |
                  server {
                      listen 80 proxy_protocol;

                      location / {
                          default_type text/plain;
                          return 200 "tcp_source_ip=$remote_addr\nproxy_protocol_ip=$proxy_protocol_addr\n";
                      }
                  }
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: nginx-pp-test
                namespace: default
                labels:
                  app: nginx-pp-test
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: nginx-pp-test
                template:
                  metadata:
                    labels:
                      app: nginx-pp-test
                  spec:
                    containers:
                      - name: nginx
                        image: nginx:1.27
                        ports:
                          - containerPort: 80
                        volumeMounts:
                          - name: config
                            mountPath: /etc/nginx/conf.d
                        readinessProbe:
                          tcpSocket:
                            port: 80
                          initialDelaySeconds: 2
                          periodSeconds: 5
                    volumes:
                      - name: config
                        configMap:
                          name: nginx-pp-test
        - assert:
            timeout: 60s
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: nginx-pp-test
                namespace: default
              status:
                readyReplicas: 1
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: create-positive-service
      cluster: tenant1
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: ($pos_service_name)
                namespace: default
                annotations:
                  kubelb.k8c.io/proxy-protocol: "v2"
              spec:
                type: LoadBalancer
                externalTrafficPolicy: Local
                selector:
                  app: nginx-pp-test
                ports:
                  - port: 9090
                    targetPort: 80
        - assert:
            timeout: 60s
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: ($pos_service_name)
                namespace: default
              status:
                loadBalancer:
                  ingress:
                    - {}
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-pp-annotation-on-crd
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            env:
              - name: LB_NS
                value: ($kubelb_namespace)
              - name: SERVICE_NAME
                value: ($pos_service_name)
            content: |
              set -e
              for i in $(seq 1 15); do
                LB=$(kubectl get loadbalancers.kubelb.k8c.io -n "$LB_NS" \
                  -l kubelb.k8c.io/origin-name="$SERVICE_NAME" -o name 2>/dev/null | head -1)
                if [ -n "$LB" ]; then
                  PP=$(kubectl get $LB -n "$LB_NS" \
                    -o jsonpath='{.metadata.annotations.kubelb\.k8c\.io/proxy-protocol}')
                  if [ "$PP" = "v2" ]; then
                    echo "LB CRD has proxy-protocol=v2 annotation"
                    exit 0
                  fi
                  echo "Expected proxy-protocol=v2, got '$PP'"
                  exit 1
                fi
                sleep 2
              done
              echo "LB CRD not found"
              exit 1
            check:
              ($error == null): true
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-client-ip-with-pp
      try:
        - script:
            timeout: 120s
            env:
              - name: SERVICE_NAME
                value: ($pos_service_name)
            content: |
              set -e
              ROOT_DIR="$(git rev-parse --show-toplevel)"
              KUBECONFIGS_DIR="${ROOT_DIR}/.e2e-kubeconfigs"

              IP=$(KUBECONFIG="${KUBECONFIGS_DIR}/tenant1.kubeconfig" \
                kubectl get svc "$SERVICE_NAME" -n default \
                -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

              EXPECTED_CLIENT_IP=$(docker exec kubelb-control-plane ip -4 route \
                | awk '/default/ {print $3}')
              if [ -z "$EXPECTED_CLIENT_IP" ]; then
                EXPECTED_CLIENT_IP=$(docker network inspect kind \
                  -f '{{range .IPAM.Config}}{{if .Gateway}}{{.Gateway}} {{end}}{{end}}' \
                  | tr ' ' '\n' | grep -v ':' | head -1)
              fi
              if [ -z "$EXPECTED_CLIENT_IP" ]; then
                echo "Could not determine Kind network gateway IP"
                exit 1
              fi

              for i in $(seq 1 30); do
                RESPONSE=$(curl -s --max-time 5 "http://${IP}:9090/" || true)
                if [ -n "$RESPONSE" ]; then
                  break
                fi
                sleep 3
              done
              if [ -z "$RESPONSE" ]; then
                echo "Service never became reachable"
                exit 1
              fi

              for i in $(seq 1 5); do
                RESPONSE=$(curl -s --max-time 5 "http://${IP}:9090/" || true)
                if [ -z "$RESPONSE" ]; then
                  sleep 2
                  continue
                fi

                TCP_IP=$(echo "$RESPONSE" | grep '^tcp_source_ip=' | cut -d= -f2 | tr -d '[:space:]')
                PP_IP=$(echo "$RESPONSE" | grep '^proxy_protocol_ip=' | cut -d= -f2 | tr -d '[:space:]')

                if [ -z "$TCP_IP" ] || [ -z "$PP_IP" ]; then
                  sleep 2
                  continue
                fi

                if [ "$PP_IP" != "$EXPECTED_CLIENT_IP" ]; then
                  echo "proxy_protocol_ip ($PP_IP) != expected client IP ($EXPECTED_CLIENT_IP)"
                  exit 1
                fi

                if [ "$PP_IP" = "$TCP_IP" ]; then
                  echo "proxy_protocol_ip equals tcp_source_ip ($TCP_IP) — PP not carrying original client"
                  exit 1
                fi

                echo "Proxy Protocol preserved client IP: tcp=$TCP_IP, pp=$PP_IP, expected=$EXPECTED_CLIENT_IP"
                exit 0
              done

              echo "Could not verify proxy protocol IP behavior"
              exit 1
            check:
              ($error == null): true
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    # Cleanup
    - name: cleanup
      try:
        - delete:
            cluster: tenant1
            ref:
              apiVersion: v1
              kind: Service
              name: ($neg_service_name)
              namespace: default
        - delete:
            cluster: tenant1
            ref:
              apiVersion: v1
              kind: Service
              name: ($pos_service_name)
              namespace: default
        - delete:
            cluster: tenant1
            ref:
              apiVersion: apps/v1
              kind: Deployment
              name: nginx-pp-test
              namespace: default
        - delete:
            cluster: tenant1
            ref:
              apiVersion: v1
              kind: ConfigMap
              name: nginx-pp-test
              namespace: default
      finally:
        - script:
            cluster: tenant1
            timeout: 30s
            content: |
              kubectl delete service echo-pp-neg nginx-pp-test -n default --ignore-not-found
              kubectl delete deployment nginx-pp-test -n default --ignore-not-found
              kubectl delete configmap nginx-pp-test -n default --ignore-not-found

    - name: verify-negative-crd-removed
      use:
        template: ../../../../step-templates/layer4/verify-lb-cleanup.yaml
        with:
          bindings:
            - name: service_name
              value: echo-pp-neg
            - name: kubelb_namespace
              value: tenant-primary

    - name: verify-positive-crd-removed
      use:
        template: ../../../../step-templates/layer4/verify-lb-cleanup.yaml
        with:
          bindings:
            - name: service_name
              value: nginx-pp-test
            - name: kubelb_namespace
              value: tenant-primary
