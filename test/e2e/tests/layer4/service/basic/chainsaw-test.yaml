apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: basic-service-loadbalancer
  labels:
    all:
    test: basic
    resource: service
    layer: layer4
spec:
  description: |
    Test basic LoadBalancer service full lifecycle.
    Creates LoadBalancer service, verifies CRD in kubelb cluster,
    tests HTTP connectivity, then verifies cleanup removes CRD.
  bindings:
    - name: service_name
      value: echo-basic
    - name: kubelb_namespace
      value: tenant-primary
  steps:
    - name: create-loadbalancer-service
      cluster: tenant1
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: ($service_name)
                namespace: default
              spec:
                type: LoadBalancer
                selector:
                  app: echo-shared
                ports:
                  - port: 80
                    targetPort: 5678
        - assert:
            timeout: 60s
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: ($service_name)
                namespace: default
              status:
                loadBalancer:
                  ingress:
                    - {}
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-loadbalancer-crd
      use:
        template: ../../../../step-templates/layer4/assert-lb-crd.yaml
        with:
          bindings:
            - name: service_name
              value: echo-basic
            - name: kubelb_namespace
              value: tenant-primary
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-status-propagation
      use:
        template: ../../../../step-templates/layer4/verify-status-propagation.yaml
        with:
          bindings:
            - name: service_name
              value: echo-basic
            - name: tenant
              value: tenant1
            - name: kubelb_namespace
              value: tenant-primary
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-http-response
      use:
        template: ../../../../step-templates/layer4/verify-http-response.yaml
        with:
          bindings:
            - name: service_name
              value: echo-basic
            - name: expected
              value: hello-shared
            - name: port
              value: "80"
            - name: tenant
              value: tenant1
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: cleanup-and-verify
      try:
        - delete:
            cluster: tenant1
            ref:
              apiVersion: v1
              kind: Service
              name: ($service_name)
              namespace: default
      finally:
        - script:
            cluster: tenant1
            timeout: 30s
            content: |
              kubectl delete service echo-basic -n default --ignore-not-found

    - name: verify-crd-removed
      use:
        template: ../../../../step-templates/layer4/verify-lb-cleanup.yaml
        with:
          bindings:
            - name: service_name
              value: echo-basic
            - name: kubelb_namespace
              value: tenant-primary
