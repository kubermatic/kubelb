apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: single-node-service-loadbalancer
  labels:
    all:
    multi-tenant: "true"
    test: single-node
    resource: service
    layer: layer4
    nodes: single
spec:
  description: |
    Test LoadBalancer service on single-node cluster (tenant2).
  bindings:
    - name: service_name
      value: echo-single-node
    - name: kubelb_namespace
      value: tenant-secondary
  steps:
    - name: create-loadbalancer-service
      cluster: tenant2
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: ($service_name)
                namespace: default
              spec:
                type: LoadBalancer
                selector:
                  app: echo-shared
                ports:
                  - port: 80
                    targetPort: 5678
        - assert:
            timeout: 60s
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: ($service_name)
                namespace: default
              status:
                loadBalancer:
                  ingress:
                    - {}
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-loadbalancer-crd
      use:
        template: ../../../../step-templates/layer4/assert-lb-crd.yaml
        with:
          bindings:
            - name: service_name
              value: echo-single-node
            - name: kubelb_namespace
              value: tenant-secondary
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-http-response
      use:
        template: ../../../../step-templates/layer4/verify-http-response.yaml
        with:
          bindings:
            - name: service_name
              value: echo-single-node
            - name: expected
              value: hello-shared
            - name: port
              value: "80"
            - name: tenant
              value: tenant2

    - name: cleanup
      cluster: tenant2
      try:
        - delete:
            ref:
              apiVersion: v1
              kind: Service
              name: ($service_name)
              namespace: default
      finally:
        - script:
            cluster: tenant2
            timeout: 30s
            content: |
              kubectl delete service echo-single-node -n default --ignore-not-found
