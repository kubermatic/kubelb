apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: multiple-services-loadbalancer
  labels:
    all:
    test: multiple-services
    resource: service
    layer: layer4
spec:
  description: |
    Test multiple distinct LoadBalancer services on the same tenant.
    Deploys two separate echo servers with different messages,
    creates two LoadBalancer services, verifies each works independently.
  bindings:
    - name: name1
      value: echo-svc-one
    - name: name2
      value: echo-svc-two
    - name: message1
      value: "hello-from-service-one"
    - name: message2
      value: "hello-from-service-two"
    - name: kubelb_namespace
      value: tenant-primary
  steps:
    - name: deploy-echo-server-one
      cluster: tenant1
      bindings:
        - name: name
          value: ($name1)
        - name: message
          value: ($message1)
      try:
        - apply:
            file: ../../../../testdata/deployments/echo-server.yaml
        - assert:
            timeout: 60s
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ($name1)
                namespace: default
              status:
                readyReplicas: 1
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: deploy-echo-server-two
      cluster: tenant1
      bindings:
        - name: name
          value: ($name2)
        - name: message
          value: ($message2)
      try:
        - apply:
            file: ../../../../testdata/deployments/echo-server.yaml
        - assert:
            timeout: 60s
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ($name2)
                namespace: default
              status:
                readyReplicas: 1
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: create-loadbalancer-one
      cluster: tenant1
      bindings:
        - name: name
          value: ($name1)
      try:
        - apply:
            file: ../../../../testdata/services/echo-lb.yaml
        - assert:
            timeout: 60s
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: ($name1)
                namespace: default
              status:
                loadBalancer:
                  ingress:
                    - {}
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: create-loadbalancer-two
      cluster: tenant1
      bindings:
        - name: name
          value: ($name2)
      try:
        - apply:
            file: ../../../../testdata/services/echo-lb.yaml
        - assert:
            timeout: 60s
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: ($name2)
                namespace: default
              status:
                loadBalancer:
                  ingress:
                    - {}
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-lb-crd-one
      use:
        template: ../../../../step-templates/layer4/assert-lb-crd.yaml
        with:
          bindings:
            - name: service_name
              value: echo-svc-one
            - name: kubelb_namespace
              value: tenant-primary
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-lb-crd-two
      use:
        template: ../../../../step-templates/layer4/assert-lb-crd.yaml
        with:
          bindings:
            - name: service_name
              value: echo-svc-two
            - name: kubelb_namespace
              value: tenant-primary
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-status-one
      use:
        template: ../../../../step-templates/layer4/verify-status-propagation.yaml
        with:
          bindings:
            - name: service_name
              value: echo-svc-one
            - name: tenant
              value: tenant1
            - name: kubelb_namespace
              value: tenant-primary

    - name: verify-status-two
      use:
        template: ../../../../step-templates/layer4/verify-status-propagation.yaml
        with:
          bindings:
            - name: service_name
              value: echo-svc-two
            - name: tenant
              value: tenant1
            - name: kubelb_namespace
              value: tenant-primary

    - name: verify-service-one-response
      use:
        template: ../../../../step-templates/layer4/verify-http-response.yaml
        with:
          bindings:
            - name: service_name
              value: echo-svc-one
            - name: expected
              value: "hello-from-service-one"
            - name: port
              value: "80"
            - name: tenant
              value: tenant1

    - name: verify-service-two-response
      use:
        template: ../../../../step-templates/layer4/verify-http-response.yaml
        with:
          bindings:
            - name: service_name
              value: echo-svc-two
            - name: expected
              value: "hello-from-service-two"
            - name: port
              value: "80"
            - name: tenant
              value: tenant1

    - name: verify-service-isolation
      cluster: tenant1
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              IP1=$(kubectl get svc echo-svc-one -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
              IP2=$(kubectl get svc echo-svc-two -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

              if [ -z "$IP1" ] || [ -z "$IP2" ]; then
                echo "Missing IP on one or both services"
                exit 1
              fi

              if [ "$IP1" = "$IP2" ]; then
                echo "Both services have same IP $IP1 - expected different IPs"
                exit 1
              fi

              echo "Services have different IPs: $IP1 vs $IP2"
            check:
              ($error == null): true

    - name: verify-concurrent-requests
      cluster: tenant1
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              IP1=$(kubectl get svc echo-svc-one -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
              IP2=$(kubectl get svc echo-svc-two -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
              SUCCESS1=0
              SUCCESS2=0

              for i in $(seq 1 10); do
                RESP1=$(curl -s --max-time 5 "http://${IP1}" || true)
                if echo "$RESP1" | grep -q "hello-from-service-one"; then
                  SUCCESS1=$((SUCCESS1 + 1))
                fi
                RESP2=$(curl -s --max-time 5 "http://${IP2}" || true)
                if echo "$RESP2" | grep -q "hello-from-service-two"; then
                  SUCCESS2=$((SUCCESS2 + 1))
                fi
              done

              if [ "$SUCCESS1" -eq 10 ] && [ "$SUCCESS2" -eq 10 ]; then
                echo "All requests to both services succeeded"
                exit 0
              fi
              echo "svc-one: $SUCCESS1/10, svc-two: $SUCCESS2/10"
              exit 1
            check:
              ($error == null): true
