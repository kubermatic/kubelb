apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cross-tenant-service-loadbalancer
  labels:
    all:
    multi-tenant: "true"
    test: cross-tenant
    resource: service
    layer: layer4
spec:
  description: |
    Test tenant isolation with same service name.
    Deploys echo server on both tenant1 and tenant2 with different messages,
    creates LoadBalancer services with same name, verifies isolation.
  bindings:
    - name: name
      value: echo-cross
    - name: message_tenant1
      value: "hello-from-tenant1"
    - name: message_tenant2
      value: "hello-from-tenant2"
  steps:
    - name: deploy-echo-tenant1
      cluster: tenant1
      bindings:
        - name: message
          value: ($message_tenant1)
      try:
        - apply:
            file: ../../../../testdata/deployments/echo-server.yaml
        - assert:
            timeout: 60s
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ($name)
                namespace: default
              status:
                readyReplicas: 1
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: deploy-echo-tenant2
      cluster: tenant2
      bindings:
        - name: message
          value: ($message_tenant2)
      try:
        - apply:
            file: ../../../../testdata/deployments/echo-server.yaml
        - assert:
            timeout: 60s
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ($name)
                namespace: default
              status:
                readyReplicas: 1
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: create-lb-tenant1
      cluster: tenant1
      try:
        - apply:
            file: ../../../../testdata/services/echo-lb.yaml
        - assert:
            timeout: 120s
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: ($name)
                namespace: default
              status:
                loadBalancer:
                  ingress:
                    - {}
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: create-lb-tenant2
      cluster: tenant2
      try:
        - apply:
            file: ../../../../testdata/services/echo-lb.yaml
        - assert:
            timeout: 120s
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: ($name)
                namespace: default
              status:
                loadBalancer:
                  ingress:
                    - {}
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-lb-crd-tenant1
      use:
        template: ../../../../step-templates/layer4/assert-lb-crd.yaml
        with:
          bindings:
            - name: service_name
              value: echo-cross
            - name: kubelb_namespace
              value: tenant-primary
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-lb-crd-tenant2
      use:
        template: ../../../../step-templates/layer4/assert-lb-crd.yaml
        with:
          bindings:
            - name: service_name
              value: echo-cross
            - name: kubelb_namespace
              value: tenant-secondary
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-status-tenant1
      use:
        template: ../../../../step-templates/layer4/verify-status-propagation.yaml
        with:
          bindings:
            - name: service_name
              value: echo-cross
            - name: tenant
              value: tenant1
            - name: kubelb_namespace
              value: tenant-primary

    - name: verify-status-tenant2
      use:
        template: ../../../../step-templates/layer4/verify-status-propagation.yaml
        with:
          bindings:
            - name: service_name
              value: echo-cross
            - name: tenant
              value: tenant2
            - name: kubelb_namespace
              value: tenant-secondary

    - name: verify-tenant1-response
      use:
        template: ../../../../step-templates/layer4/verify-http-response.yaml
        with:
          bindings:
            - name: service_name
              value: echo-cross
            - name: expected
              value: "hello-from-tenant1"
            - name: port
              value: "80"
            - name: tenant
              value: tenant1

    - name: verify-tenant2-response
      use:
        template: ../../../../step-templates/layer4/verify-http-response.yaml
        with:
          bindings:
            - name: service_name
              value: echo-cross
            - name: expected
              value: "hello-from-tenant2"
            - name: port
              value: "80"
            - name: tenant
              value: tenant2

    - name: verify-ip-isolation
      try:
        - script:
            timeout: 120s
            content: |
              set -e
              ROOT_DIR="$(git rev-parse --show-toplevel)"
              KUBECONFIGS_DIR="${ROOT_DIR}/.e2e-kubeconfigs"

              IP1=$(KUBECONFIG="${KUBECONFIGS_DIR}/tenant1.kubeconfig" kubectl get svc echo-cross -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
              IP2=$(KUBECONFIG="${KUBECONFIGS_DIR}/tenant2.kubeconfig" kubectl get svc echo-cross -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)

              if [ -z "$IP1" ] || [ -z "$IP2" ]; then
                echo "Missing IP on one or both tenants"
                exit 1
              fi

              if [ "$IP1" = "$IP2" ]; then
                echo "Both tenants have same IP - may indicate shared LB"
                exit 0
              fi

              echo "Tenants have different IPs (full isolation): $IP1 vs $IP2"
            check:
              ($error == null): true
