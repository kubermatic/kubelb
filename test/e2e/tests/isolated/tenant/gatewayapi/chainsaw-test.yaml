# Tenant Gateway API Settings Test
# Verifies:
# - Tenant.spec.gatewayAPI.class overrides Config
# - Tenant.spec.gatewayAPI.disable disables Gateway API for tenant
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tenant-gatewayapi
  labels:
    all:
    isolated: "true"
    resource: tenant
    feature: gatewayapi
spec:
  concurrent: false
  description: |
    Test that Tenant.spec.gatewayAPI settings work correctly for
    per-tenant Gateway API configuration.
  steps:
    - name: reset-tenants
      use:
        template: ../../../../step-templates/isolated/reset-tenants.yaml
        with:
          bindings:
            - name: manifestsPath
              value: ../../../../manifests

    - name: patch-tenant-with-gateway-class
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              kubectl patch tenant primary --type=merge -p '{
                "spec": {
                  "gatewayAPI": {
                    "class": "tenant-gateway-class"
                  }
                }
              }'
            check:
              ($error == null): true
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-tenant-gateway-class-set
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              CLASS=$(kubectl get tenant primary -o jsonpath='{.spec.gatewayAPI.class}')
              if [ "$CLASS" = "tenant-gateway-class" ]; then
                echo "Tenant gateway class is 'tenant-gateway-class'"
                exit 0
              fi
              echo "Tenant gateway class is '$CLASS'"
              exit 1
            check:
              ($error == null): true
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: test-full-gateway-disable
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              kubectl patch tenant primary --type=merge -p '{
                "spec": {
                  "gatewayAPI": {
                    "disable": true
                  }
                }
              }'
            check:
              ($error == null): true
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml

    - name: verify-gateway-disabled
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              DISABLED=$(kubectl get tenant primary -o jsonpath='{.spec.gatewayAPI.disable}')
              if [ "$DISABLED" = "true" ]; then
                echo "Gateway API is disabled"
                exit 0
              fi
              echo "Gateway API disabled flag is '$DISABLED'"
              exit 1
            check:
              ($error == null): true
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml
      finally:
        - script:
            cluster: kubelb
            timeout: 60s
            content: |
              kubectl replace -f ../../../../manifests/tenants/primary.yaml
