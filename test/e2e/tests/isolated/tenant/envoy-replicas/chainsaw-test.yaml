# Tenant Envoy Replicas Test
# Verifies:
# - Tenant.spec.envoyProxy.replicas overrides Config default
# - Removing override reverts to Config default
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: envoy-replicas
  labels:
    all:
    isolated: "true"
    resource: tenant
    feature: envoy-replicas
spec:
  concurrent: false
  description: |
    Test that Tenant.spec.envoyProxy.replicas overrides the Config default
    and removing the override reverts to the Config default (3).
  steps:
    - name: reset-tenants
      use:
        template: ../../../../step-templates/isolated/reset-tenants.yaml
        with:
          bindings:
            - name: manifestsPath
              value: ../../../../manifests

    - name: verify-baseline-replicas
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              NAMESPACE="tenant-secondary"
              EXPECTED=3

              for i in $(seq 1 15); do
                DEPLOY=$(kubectl get deployment envoy-tenant-secondary -n "$NAMESPACE" -o name 2>/dev/null || true)
                if [ -n "$DEPLOY" ]; then
                  REPLICAS=$(kubectl get deployment envoy-tenant-secondary -n "$NAMESPACE" -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
                  if [ "$REPLICAS" = "$EXPECTED" ]; then
                    echo "Baseline replicas: $REPLICAS"
                    exit 0
                  fi
                fi
                sleep 2
              done
              echo "Expected $EXPECTED replicas, got $REPLICAS"
              exit 1
            check:
              ($error == null): true

    - name: patch-tenant-replicas
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              kubectl patch tenant secondary --type=merge -p '{
                "spec": {
                  "envoyProxy": {
                    "replicas": 5
                  }
                }
              }'
            check:
              ($error == null): true

    - name: verify-scaled-to-5
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              NAMESPACE="tenant-secondary"
              EXPECTED=5

              for i in $(seq 1 15); do
                REPLICAS=$(kubectl get deployment envoy-tenant-secondary -n "$NAMESPACE" -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
                if [ "$REPLICAS" = "$EXPECTED" ]; then
                  echo "Replicas scaled to $REPLICAS"
                  exit 0
                fi
                sleep 2
              done
              echo "Expected $EXPECTED replicas, got $REPLICAS"
              exit 1
            check:
              ($error == null): true

    - name: remove-envoy-proxy-override
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              kubectl patch tenant secondary --type=json -p '[{"op":"remove","path":"/spec/envoyProxy"}]'
            check:
              ($error == null): true

    - name: verify-reverted-to-3
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              NAMESPACE="tenant-secondary"
              EXPECTED=3

              for i in $(seq 1 15); do
                REPLICAS=$(kubectl get deployment envoy-tenant-secondary -n "$NAMESPACE" -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
                if [ "$REPLICAS" = "$EXPECTED" ]; then
                  echo "Replicas reverted to $REPLICAS"
                  exit 0
                fi
                sleep 2
              done
              echo "Expected $EXPECTED replicas, got $REPLICAS"
              exit 1
            check:
              ($error == null): true
      finally:
        - script:
            cluster: kubelb
            timeout: 60s
            content: |
              set -e
              kubectl replace -f ../../../../manifests/tenants/secondary.yaml
            check:
              ($error == null): true
