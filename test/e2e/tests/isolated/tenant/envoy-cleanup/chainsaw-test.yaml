# Envoy Proxy Cleanup Test
# Verifies:
# - Envoy proxy is deleted when no LBs/Routes exist for a tenant
# - Uses tenant secondary (tenant2) to avoid affecting other tests
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: envoy-cleanup
  labels:
    all:
    multi-tenant: "true"
    isolated: "true"
    resource: tenant
    feature: envoy-cleanup
spec:
  concurrent: false
  description: |
    Test that Envoy proxy is cleaned up when no LoadBalancers or Routes
    exist for a tenant. Uses secondary tenant to avoid affecting other tests.
  steps:
    - name: reset-tenants
      use:
        template: ../../../../step-templates/isolated/reset-tenants.yaml
        with:
          bindings:
            - name: manifestsPath
              value: ../../../../manifests

    - name: verify-baseline-lb-exists
      cluster: tenant2
      try:
        - assert:
            timeout: 60s
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: echo-shared-lb
                namespace: default
              status:
                loadBalancer:
                  ingress:
                    - {}

    - name: verify-envoy-running
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              NAMESPACE="tenant-secondary"

              for i in $(seq 1 10); do
                DEPLOY=$(kubectl get deployment envoy-tenant-secondary -n "$NAMESPACE" -o name 2>/dev/null || true)
                if [ -n "$DEPLOY" ]; then
                  REPLICAS=$(kubectl get deployment envoy-tenant-secondary -n "$NAMESPACE" -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
                  if [ "$REPLICAS" -gt 0 ] 2>/dev/null; then
                    echo "Envoy deployment running with $REPLICAS replicas"
                    exit 0
                  fi
                fi
                sleep 2
              done
              echo "Envoy deployment not running"
              exit 1
            check:
              ($error == null): true

    - name: cleanup-tenant2-resources
      description: Delete all LB services, gateways, ingresses, routes on tenant2 left by concurrent tests
      cluster: tenant2
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              kubectl delete svc echo-shared-lb -n default
              kubectl delete gateway --all -n default --ignore-not-found
              kubectl delete httproute --all -n default --ignore-not-found
              kubectl delete ingress --all -n default --ignore-not-found
            check:
              ($error == null): true

    - name: verify-lb-count-zero
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              NAMESPACE="tenant-secondary"

              for i in $(seq 1 20); do
                COUNT=$(kubectl get loadbalancers.kubelb.k8c.io -n "$NAMESPACE" --no-headers 2>/dev/null | wc -l | tr -d ' ')
                if [ "$COUNT" = "0" ]; then
                  echo "LoadBalancer count is 0"
                  exit 0
                fi
                sleep 2
              done
              echo "LoadBalancer count is $COUNT, expected 0"
              kubectl get loadbalancers.kubelb.k8c.io -n "$NAMESPACE" -o wide || true
              exit 1
            check:
              ($error == null): true

    - name: verify-route-count-zero
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              NAMESPACE="tenant-secondary"

              for i in $(seq 1 20); do
                COUNT=$(kubectl get routes.kubelb.k8c.io -n "$NAMESPACE" --no-headers 2>/dev/null | wc -l | tr -d ' ')
                if [ "$COUNT" = "0" ]; then
                  echo "Route count is 0"
                  exit 0
                fi
                sleep 2
              done
              echo "Route count is $COUNT, expected 0"
              kubectl get routes.kubelb.k8c.io -n "$NAMESPACE" -o wide || true
              exit 1
            check:
              ($error == null): true

    - name: verify-envoy-cleaned-up
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              NAMESPACE="tenant-secondary"

              for i in $(seq 1 15); do
                DEPLOY=$(kubectl get deployment envoy-tenant-secondary -n "$NAMESPACE" -o name 2>/dev/null || true)
                if [ -z "$DEPLOY" ]; then
                  echo "Envoy deployment removed"
                  exit 0
                fi
                sleep 2
              done
              echo "Envoy deployment still exists"
              kubectl get deployment -n "$NAMESPACE" || true
              exit 1
            check:
              ($error == null): true
      finally:
        - script:
            cluster: tenant2
            timeout: 60s
            content: |
              set -e
              kubectl apply -f - <<EOF
              apiVersion: v1
              kind: Service
              metadata:
                name: echo-shared-lb
                namespace: default
              spec:
                type: LoadBalancer
                selector:
                  app: echo-shared
                ports:
                  - port: 80
                    targetPort: 5678
              EOF

              for i in $(seq 1 10); do
                IP=$(kubectl get svc echo-shared-lb -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
                if [ -n "$IP" ]; then
                  echo "echo-shared-lb restored with IP $IP"
                  exit 0
                fi
                sleep 2
              done
              echo "WARNING: echo-shared-lb may not have IP yet"
