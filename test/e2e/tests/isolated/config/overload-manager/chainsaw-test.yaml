# Overload Manager Test
# Verifies:
# - Config.spec.envoyProxy.overloadManager enables overload management
# - Envoy bootstrap contains overloadManager section
# - Graceful shutdown sidecar is present when enabled
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: overload-manager
  labels:
    all:
    isolated: "true"
    resource: config
    feature: overload-manager
spec:
  concurrent: false
  description: |
    Test that enabling overload manager in Config.spec.envoyProxy.overloadManager
    adds overloadManager section to Envoy bootstrap config and that
    shutdown-manager sidecar is present when gracefulShutdown is enabled.
  steps:
    - name: reset-configs
      use:
        template: ../../../../step-templates/isolated/reset-configs.yaml
        with:
          bindings:
            - name: manifestsPath
              value: ../../../../manifests

    - name: create-loadbalancer-service
      cluster: tenant1
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: echo-overload-test
                namespace: default
              spec:
                type: LoadBalancer
                selector:
                  app: echo-shared
                ports:
                  - port: 80
                    targetPort: 5678

    - name: wait-for-envoy-ready
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              kubectl wait --for=condition=Available deployment/envoy-tenant-primary \
                -n tenant-primary --timeout=60s
            check:
              ($error == null): true

    - name: patch-config-enable-overload-manager
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              kubectl patch config default -n kubelb --type=merge -p '{
                "spec": {
                  "envoyProxy": {
                    "overloadManager": {
                      "enabled": true,
                      "maxActiveDownstreamConnections": 50000,
                      "maxHeapSizeBytes": 1073741824
                    },
                    "gracefulShutdown": {
                      "disabled": false
                    }
                  }
                }
              }'
            check:
              ($error == null): true

    - name: wait-for-deployment-rollout
      cluster: kubelb
      try:
        - script:
            timeout: 90s
            content: |
              set -e
              NAMESPACE="tenant-primary"
              DEPLOY="envoy-tenant-primary"

              for i in $(seq 1 24); do
                ARGS=$(kubectl get deployment "$DEPLOY" -n "$NAMESPACE" \
                  -o jsonpath='{.spec.template.spec.containers[0].args[1]}' 2>/dev/null || true)

                SIDECAR=$(kubectl get deployment "$DEPLOY" -n "$NAMESPACE" \
                  -o jsonpath='{.spec.template.spec.containers[?(@.name=="shutdown-manager")].name}' 2>/dev/null || true)

                if echo "$ARGS" | grep -q "overloadManager" && [ "$SIDECAR" = "shutdown-manager" ]; then
                  echo "Deployment has overloadManager and shutdown-manager sidecar"
                  kubectl rollout status deployment/"$DEPLOY" -n "$NAMESPACE" --timeout=60s
                  exit 0
                fi

                sleep 5
              done

              echo "Deployment not updated with overloadManager and/or shutdown-manager sidecar"
              echo "overloadManager check: $(echo "$ARGS" | grep -o 'overloadManager' || echo 'not found')"
              echo "shutdown-manager sidecar: ${SIDECAR:-not found}"
              exit 1
            check:
              ($error == null): true
      finally:
        - script:
            cluster: tenant1
            timeout: 60s
            content: |
              kubectl delete svc echo-overload-test -n default --ignore-not-found
        - script:
            cluster: kubelb
            timeout: 60s
            content: |
              set -e
              kubectl delete svc -n tenant-primary -l kubelb.k8c.io/origin-name=echo-overload-test --ignore-not-found
              kubectl delete loadbalancers.kubelb.k8c.io -n tenant-primary -l kubelb.k8c.io/origin-name=echo-overload-test --ignore-not-found
              kubectl replace -f ../../../../manifests/kubelb-manager/config.yaml
