apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: envoy-proxy-podmonitor
  labels:
    all:
    feature: podmonitor
    resource: config
    test: envoy-proxy-podmonitor
spec:
  description: Verify PodMonitor is created for envoy proxy in each tenant namespace.
  steps:
    - name: verify-podmonitor-tenant-primary
      cluster: kubelb
      try:
        - assert:
            timeout: 60s
            resource:
              apiVersion: monitoring.coreos.com/v1
              kind: PodMonitor
              metadata:
                name: envoy-proxy
                namespace: tenant-primary
                labels:
                  app.kubernetes.io/name: kubelb-envoy-proxy
                  app.kubernetes.io/managed-by: kubelb
              spec:
                selector:
                  matchLabels:
                    app.kubernetes.io/name: kubelb-envoy-proxy
                podMetricsEndpoints:
                  - port: metrics
                    path: /stats/prometheus
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml
    - name: verify-podmonitor-tenant-secondary
      cluster: kubelb
      try:
        - assert:
            timeout: 60s
            resource:
              apiVersion: monitoring.coreos.com/v1
              kind: PodMonitor
              metadata:
                name: envoy-proxy
                namespace: tenant-secondary
                labels:
                  app.kubernetes.io/name: kubelb-envoy-proxy
                  app.kubernetes.io/managed-by: kubelb
              spec:
                selector:
                  matchLabels:
                    app.kubernetes.io/name: kubelb-envoy-proxy
                podMetricsEndpoints:
                  - port: metrics
                    path: /stats/prometheus
      catch:
        - use:
            template: ../../../../step-templates/debug/collect-diagnostics.yaml
