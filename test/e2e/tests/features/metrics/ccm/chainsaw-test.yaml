apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ccm-metrics
  labels:
    all:
    feature: metrics
    resource: metrics
    test: ccm-metrics
spec:
  description: Verify KubeLB CCM metrics endpoint is scrapable and exposes expected metrics.
  steps:
    - name: scrape-ccm-metrics
      cluster: tenant1
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              NAMESPACE=kubelb
              POD=$(kubectl get pod -n "$NAMESPACE" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' \
                | grep -E '^kubelb-ccm-' | head -1)
              if [ -z "$POD" ]; then
                echo "Could not find CCM pod"
                exit 1
              fi

              kubectl port-forward -n "$NAMESPACE" "$POD" 19445:9445 &
              PF_PID=$!
              trap "kill $PF_PID 2>/dev/null || true" EXIT
              sleep 2

              METRICS=$(curl -s --max-time 10 http://localhost:19445/metrics)
              if [ -z "$METRICS" ]; then
                echo "No metrics returned"
                exit 1
              fi

              echo "$METRICS" | grep -q "kubelb_ccm_managed_services"
              echo "$METRICS" | grep -q "kubelb_ccm_kubelb_cluster_connected"

              echo "All expected CCM metrics found"
            check:
              ($error == null): true
