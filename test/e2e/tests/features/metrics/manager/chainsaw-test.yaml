apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: manager-metrics
  labels:
    all:
    feature: metrics
    resource: metrics
    test: manager-metrics
spec:
  description: Verify KubeLB manager metrics endpoint is scrapable and exposes expected metrics.
  steps:
    - name: scrape-manager-metrics
      cluster: kubelb
      try:
        - script:
            timeout: 60s
            content: |
              set -e
              NAMESPACE=kubelb
              POD=$(kubectl get pod -n "$NAMESPACE" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' \
                | grep -E '^kubelb-[a-f0-9]' | head -1)
              if [ -z "$POD" ]; then
                echo "Could not find manager pod"
                exit 1
              fi

              kubectl port-forward -n "$NAMESPACE" "$POD" 19443:9443 &
              PF_PID=$!
              trap "kill $PF_PID 2>/dev/null || true" EXIT
              sleep 2

              METRICS=$(curl -s --max-time 10 http://localhost:19443/metrics)
              if [ -z "$METRICS" ]; then
                echo "No metrics returned"
                exit 1
              fi

              echo "$METRICS" | grep -q "kubelb_manager_loadbalancers"
              echo "$METRICS" | grep -q "kubelb_manager_tenants"

              echo "All expected manager metrics found"
            check:
              ($error == null): true
