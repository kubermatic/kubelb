# Step Template: Create Gateway with HTTP listener and wait for IP
# Required bindings (pass via use.with.bindings):
#   - gateway_name: name of the Gateway resource
# Optional bindings:
#   - gateway_class: gatewayClassName (default: kubelb)
#   - gateway_port: listener port (default: 80)
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: StepTemplate
metadata:
  name: create-http-gateway
spec:
  bindings:
    - name: gateway_class
      value: kubelb
    - name: gateway_port
      value: 80
  try:
    - script:
        cluster: tenant1
        timeout: 30s
        env:
          - name: GW_NAME
            value: ($gateway_name)
          - name: GW_CLASS
            value: ($gateway_class)
          - name: GW_PORT
            value: ($gateway_port)
        content: |
          set -e
          cat <<EOF | kubectl apply -f -
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: ${GW_NAME}
            namespace: default
          spec:
            gatewayClassName: ${GW_CLASS}
            listeners:
              - name: http
                protocol: HTTP
                port: ${GW_PORT}
                allowedRoutes:
                  namespaces:
                    from: All
          EOF
        check:
          ($error == null): true
    - script:
        cluster: tenant1
        timeout: 120s
        env:
          - name: GW_NAME
            value: ($gateway_name)
        content: |
          set -e
          for i in $(seq 1 40); do
            IP=$(kubectl get gateway "$GW_NAME" -n default \
              -o jsonpath='{.status.addresses[0].value}' 2>/dev/null || true)
            if [ -n "$IP" ]; then
              echo "Gateway ready: $IP"
              exit 0
            fi
            sleep 3
          done
          echo "Gateway not ready"
          exit 1
        check:
          ($error == null): true
