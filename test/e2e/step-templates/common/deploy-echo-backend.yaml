# Step Template: Deploy echo backend (deployment + ClusterIP service + readiness check)
# Required bindings (pass via use.with.bindings):
#   - backend_name: name for deployment and service
#   - backend_message: message the echo server will return
# Optional bindings:
#   - backend_port: service port (default: 80)
#   - container_port: container port (default: 8080)
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: StepTemplate
metadata:
  name: deploy-echo-backend
spec:
  bindings:
    - name: backend_port
      value: 80
    - name: container_port
      value: 8080
  try:
    - script:
        cluster: tenant1
        timeout: 30s
        env:
          - name: NAME
            value: ($backend_name)
          - name: MESSAGE
            value: ($backend_message)
          - name: PORT
            value: ($backend_port)
          - name: CPORT
            value: ($container_port)
        content: |
          set -e
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${NAME}
            namespace: default
            labels:
              app: ${NAME}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${NAME}
            template:
              metadata:
                labels:
                  app: ${NAME}
              spec:
                containers:
                  - name: echo
                    image: hashicorp/http-echo:1.0
                    imagePullPolicy: IfNotPresent
                    args:
                      - -text=${MESSAGE}
                      - -listen=:${CPORT}
                    ports:
                      - containerPort: ${CPORT}
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${NAME}
            namespace: default
          spec:
            type: ClusterIP
            selector:
              app: ${NAME}
            ports:
              - port: ${PORT}
                targetPort: ${CPORT}
          EOF
        check:
          ($error == null): true
    - assert:
        cluster: tenant1
        timeout: 60s
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ($backend_name)
            namespace: default
          status:
            readyReplicas: 1
