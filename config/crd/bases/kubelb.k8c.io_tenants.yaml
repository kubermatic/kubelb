---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: tenants.kubelb.k8c.io
spec:
  group: kubelb.k8c.io
  names:
    kind: Tenant
    listKind: TenantList
    plural: tenants
    singular: tenant
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Tenant is the Schema for the tenants API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TenantSpec defines the desired state of Tenant
            properties:
              certificates:
                properties:
                  defaultClusterIssuer:
                    description: DefaultClusterIssuer is the Cluster Issuer to use
                      for the certificates by default. This is only used for load
                      balancer hostname.
                    type: string
                type: object
              defaultAnnotations:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  DefaultAnnotations defines the list of annotations(key-value pairs) that will be set on the load balancing resources if not already present. A special key `all` can be used to apply the same
                  set of annotations to all resources.
                  Tenant configuration has higher precedence than the annotations specified at the Config level.
                type: object
              dns:
                description: DNSSettings defines the settings for DNS management and
                  automation.
                properties:
                  allowExplicitHostnames:
                    description: |-
                      AllowExplicitHostnames is a flag that can be used to allow explicit hostnames to be used for DNS resources.
                      This is only used when LoadBalancer.Spec.Hostname is set.
                    type: boolean
                  useCertificateAnnotations:
                    description: |-
                      UseCertificateAnnotations is a flag that can be used to add Certificate annotations to Certificate resources.
                      This is only used when LoadBalancer.Spec.Hostname is set.
                    type: boolean
                  useDNSAnnotations:
                    description: |-
                      UseDNSAnnotations is a flag that can be used to add DNS annotations to DNS resources.
                      This is only used when LoadBalancer.Spec.Hostname is set.
                    type: boolean
                  wildcardDomain:
                    description: |-
                      WildcardDomain is the domain that will be used as the base domain to create wildcard DNS records for DNS resources.
                      This is only used for determining the hostname for LoadBalancer resources at LoadBalancer.Spec.Hostname.
                    type: string
                type: object
              envoyProxy:
                description: |-
                  EnvoyProxy defines tenant-level overrides for Envoy Proxy configuration.
                  Fields set here take precedence over Config.Spec.EnvoyProxy.
                properties:
                  replicas:
                    description: Replicas is the number of Envoy Proxy replicas for
                      this tenant.
                    format: int32
                    minimum: 1
                    type: integer
                  resources:
                    description: Resources defines the resource requirements for the
                      Envoy Proxy container.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                type: object
              gatewayAPI:
                description: GatewayAPISettings defines the settings for the gateway
                  API.
                properties:
                  class:
                    description: |-
                      Class is the class of the gateway API to use. This can be used to specify a specific gateway API implementation.
                      This has higher precedence than the value specified in the Config.
                    type: string
                  defaultGateway:
                    description: DefaultGateway is the default gateway reference to
                      use for the tenant. This is only used for load balancer hostname.
                    properties:
                      apiVersion:
                        description: API version of the referent.
                        type: string
                      fieldPath:
                        description: |-
                          If referring to a piece of an object instead of an entire object, this string
                          should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                          For example, if the object reference is to a container within a pod, this would take on a value like:
                          "spec.containers{name}" (where "name" refers to the name of the container that triggered
                          the event) or if no container name is specified "spec.containers[2]" (container with
                          index 2 in this pod). This syntax is chosen only to have some well-defined way of
                          referencing a part of an object.
                        type: string
                      kind:
                        description: |-
                          Kind of the referent.
                          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                        type: string
                      name:
                        description: |-
                          Name of the referent.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                      namespace:
                        description: |-
                          Namespace of the referent.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                        type: string
                      resourceVersion:
                        description: |-
                          Specific resourceVersion to which this reference is made, if any.
                          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                        type: string
                      uid:
                        description: |-
                          UID of the referent.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  disable:
                    description: Disable is a flag that can be used to disable Gateway
                      API for a tenant.
                    type: boolean
                type: object
              ingress:
                description: IngressSettings defines the settings for the ingress.
                properties:
                  class:
                    description: |-
                      Class is the class of the ingress to use.
                      This has higher precedence than the value specified in the Config.
                    type: string
                  disable:
                    description: Disable is a flag that can be used to disable Ingress
                      for a tenant.
                    type: boolean
                type: object
              loadBalancer:
                description: LoadBalancerSettings defines the settings for the load
                  balancers.
                properties:
                  class:
                    description: |-
                      Class is the class of the load balancer to use.
                      This has higher precedence than the value specified in the Config.
                    type: string
                  disable:
                    description: Disable is a flag that can be used to disable L4
                      load balancing for a tenant.
                    type: boolean
                type: object
              propagateAllAnnotations:
                description: |-
                  PropagateAllAnnotations defines whether all annotations will be propagated to the LoadBalancer service. If set to true, PropagatedAnnotations will be ignored.
                  Tenant configuration has higher precedence than the value specified at the Config level.
                type: boolean
              propagatedAnnotations:
                additionalProperties:
                  type: string
                description: |-
                  PropagatedAnnotations defines the list of annotations(key-value pairs) that will be propagated to the LoadBalancer service. Keep the `value` field empty in the key-value pair to allow any value.
                  Tenant configuration has higher precedence than the annotations specified at the Config level.
                type: object
            type: object
          status:
            description: TenantStatus defines the observed state of Tenant
            properties:
              conditions:
                description: Conditions represents the latest available observations
                  of the Tenant's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  for this Tenant by the controller.
                format: int64
                type: integer
              phase:
                description: Phase is the current lifecycle phase of the Tenant.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
