version: 2

updates:
  # Go modules
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/cli"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Group minor/patch updates together
      go-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - docs/none
      - release-note-none
      - ok-to-test

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Group all action updates together
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - docs/none
      - release-note-none
      - ok-to-test

  # Docker images (Dockerfiles)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "docker"
    labels:
      - dependencies
      - docs/none
      - release-note-none
      - ok-to-test

  # Helm chart dependencies
  - package-ecosystem: "helm"
    directory: "/charts/kubelb-manager"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "helm"
    labels:
      - dependencies
      - docs/none
      - release-note-none
      - ok-to-test

  - package-ecosystem: "helm"
    directory: "/charts/kubelb-ccm"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "helm"
    labels:
      - dependencies
      - docs/none
      - release-note-none
      - ok-to-test

  - package-ecosystem: "helm"
    directory: "/charts/kubelb-addons"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "helm"
    labels:
      - dependencies
      - docs/none
      - release-note-none
      - ok-to-test
    ignore:
      # The agentgateway charts renumbered their versioning: the dead pre-v1.0
      # lineage ended at 2.2.x, which semver-sorts above the current 1.x line,
      # so dependabot "upgrades" into the obsolete lineage (see #504, #508).
      # Upstream minors are also breaking (v1alpha1 CRDs); bump these manually.
      - dependency-name: "agentgateway"
      - dependency-name: "agentgateway-crds"
