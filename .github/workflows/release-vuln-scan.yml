name: Release Vulnerability Scan

on:
  pull_request:
    branches:
      - 'release/v*'

permissions: {}

jobs:
  scan:
    if: startsWith(github.event.pull_request.head.ref, 'chore/prepare-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: make build build-cli

      - name: Build Docker images
        run: |
          # GoReleaser dockerfiles expect binary at root context
          cp bin/kubelb kubelb
          cp bin/ccm ccm
          docker build -t kubelb-manager:scan -f kubelb.goreleaser.dockerfile .
          docker build -t kubelb-ccm:scan -f ccm.goreleaser.dockerfile .

      - name: Install and run Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/cfa322ed23f2e33ef1632ae3a5a8c7172f06a5c3/contrib/install.sh | sh -s -- -b /usr/local/bin v0.69.2
          EXIT_CODE=0
          for img in kubelb-manager:scan kubelb-ccm:scan; do
            echo "=== Scanning ${img} ==="
            trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed \
              --format table "${img}" || EXIT_CODE=1
          done
          echo "=== Scanning CLI binary ==="
          trivy rootfs --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed \
            --format table cli/bin/kubelb || EXIT_CODE=1
          exit $EXIT_CODE
