name: KubeLB Docs Update

on:
  workflow_call:
    inputs:
      version:
        description: "Release version (e.g. v1.4.0)"
        required: true
        type: string
      minor:
        description: "Minor version (e.g. v1.4)"
        required: true
        type: string
      is_patch:
        description: "Is this a patch release?"
        required: true
        type: string
    outputs:
      docs_pr_url:
        description: "URL of the created docs PR"
        value: ${{ jobs.update-docs.outputs.pr_url }}
    secrets:
      KUBERMATIC_DOCS_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.4.0)"
        required: true
        type: string
      minor:
        description: "Minor version (e.g. v1.4)"
        required: true
        type: string
      is_patch:
        description: "Is this a patch release?"
        required: true
        type: string
        default: "true"

permissions: {}

env:
  DOCS_REPO: kubermatic/docs
  KUBELB_REPO: kubermatic/kubelb

jobs:
  update-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      pr_url: ${{ steps.create-pr.outputs.pr_url }}
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.DOCS_REPO }}
          token: ${{ secrets.KUBERMATIC_DOCS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup for minor release
        if: inputs.is_patch == 'false'
        env:
          MINOR: ${{ inputs.minor }}
        run: |
          DEST="content/kubelb/${MINOR}"
          if [ ! -d "content/kubelb/main" ]; then
            echo "::error::content/kubelb/main not found; cannot seed ${MINOR}"
            exit 1
          fi
          # main is the canonical trunk for the next minor: always reseed
          # from main and rewrite branch/path refs so URLs point at the
          # release branch. Re-running the workflow produces a deterministic
          # result; manual edits should be made on main, not on the versioned
          # copy. New sections added to main (e.g. dashboards) flow in
          # automatically.
          rm -rf "$DEST"
          cp -r content/kubelb/main "$DEST"
          find "$DEST" -name "*.md" -type f -print0 | xargs -0 sed -i \
            -e "s|refs/heads/main|refs/heads/release/${MINOR}|g" \
            -e "s|/kubelb/main/|/kubelb/${MINOR}/|g"

          # release-notes/_index.en.md on main is a hand-written placeholder,
          # not a render_external_markdown shortcode, so the sed rewrite above
          # does not produce a usable page. Overwrite it with a shortcode that
          # renders the per-minor CHANGELOG from the release branch.
          cat > "${DEST}/release-notes/_index.en.md" <<EOF
          +++
          title = "Release Notes"
          date = $(date -u +%Y-%m-%dT%H:%M:%S+00:00)
          weight = 60
          +++

          {{< render_external_markdown "https://raw.githubusercontent.com/${KUBELB_REPO}/refs/heads/release/${MINOR}/docs/changelogs/CHANGELOG-${MINOR}.md" >}}
          EOF

          if ! grep -q "release: ${MINOR}" data/products.yaml; then
            awk -v minor="${MINOR}" '
              /^kubelb:/{found=1}
              found && /name: main/{
                print
                printf "    - release: %s\n      name: %s\n", minor, minor
                found=0
                next
              }
              {print}
            ' data/products.yaml > data/products.yaml.tmp
            mv data/products.yaml.tmp data/products.yaml
          fi

      - name: Update version strings in installation pages
        env:
          MINOR: ${{ inputs.minor }}
          VERSION: ${{ inputs.version }}
        run: |
          DOCS_DIR="content/kubelb/${MINOR}"

          PREV_VERSION=$(grep -ohE 'version=v[0-9]+\.[0-9]+\.[0-9]+' "${DOCS_DIR}/installation/management-cluster/_index.en.md" | head -1 | cut -d= -f2)

          if [ -z "$PREV_VERSION" ]; then
            echo "::warning::Could not detect previous version in docs, skipping version update"
            exit 0
          fi

          echo "Updating ${PREV_VERSION} → ${VERSION} in ${DOCS_DIR}"

          find "${DOCS_DIR}" -name "*.md" -type f | while read -r file; do
            if grep -q "${PREV_VERSION}" "$file"; then
              sed -i "s/${PREV_VERSION}/${VERSION}/g" "$file"
              echo "  Updated: $file"
            fi
          done

      - name: Replace helm values tables between marker comments
        env:
          MINOR: ${{ inputs.minor }}
          VERSION: ${{ inputs.version }}
        run: |
          DOCS_DIR="content/kubelb/${MINOR}"

          declare -A MARKERS
          MARKERS["kubelb-manager"]="docs/generated/helm-values-kubelb-manager.md"
          MARKERS["kubelb-ccm"]="docs/generated/helm-values-kubelb-ccm.md"
          MARKERS["kubelb-manager-ee"]="docs/generated/helm-values-kubelb-manager-ee.md"
          MARKERS["kubelb-ccm-ee"]="docs/generated/helm-values-kubelb-ccm-ee.md"

          for marker in "${!MARKERS[@]}"; do
            REMOTE_FILE="${MARKERS[$marker]}"
            RAW_URL="https://raw.githubusercontent.com/${KUBELB_REPO}/refs/tags/${VERSION}/${REMOTE_FILE}"
            TABLE=$(curl -sfL "$RAW_URL" || echo "")

            if [ -z "$TABLE" ]; then
              echo "::warning::Could not fetch ${REMOTE_FILE} for ${VERSION}, skipping ${marker}"
              continue
            fi

            START_MARKER="<!-- helm-values-${marker} start -->"
            END_MARKER="<!-- helm-values-${marker} end -->"

            find "${DOCS_DIR}" -name "*.md" -type f | while read -r file; do
              if grep -q "$START_MARKER" "$file"; then
                # Replace content between markers (keep markers intact)
                sed -i "/${START_MARKER}/,/${END_MARKER}/{
                  /${START_MARKER}/!{
                    /${END_MARKER}/!d
                  }
                }" "$file"
                # Insert new table after start marker
                sed -i "/${START_MARKER}/r /dev/stdin" "$file" <<< "$TABLE"
                echo "  Updated ${marker} in ${file}"
              fi
            done
          done

      - name: Create PR
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.KUBERMATIC_DOCS_TOKEN || secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          IS_PATCH: ${{ inputs.is_patch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/kubelb-${VERSION}-docs"
          git checkout -b "${BRANCH}"
          git add -A
          git commit -s -m "docs: update KubeLB docs for ${VERSION}" || exit 0
          git push -u origin "${BRANCH}"

          BODY="Update KubeLB documentation for release ${VERSION}."
          if [ "${IS_PATCH}" = "false" ]; then
            BODY="${BODY} Added new minor version directory and release notes."
          fi

          PR_URL=$(gh pr create \
            --repo "${{ env.DOCS_REPO }}" \
            --title "docs: update KubeLB docs for ${VERSION}" \
            --body "${BODY}")
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
