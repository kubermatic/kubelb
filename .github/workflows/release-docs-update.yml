name: KubeLB Docs Update

on:
  workflow_call:
    inputs:
      version:
        description: "Release version (e.g. v1.4.0)"
        required: true
        type: string
      minor:
        description: "Minor version (e.g. v1.4)"
        required: true
        type: string
      is_patch:
        description: "Is this a patch release?"
        required: true
        type: string
    outputs:
      docs_pr_url:
        description: "URL of the created docs PR"
        value: ${{ jobs.update-docs.outputs.pr_url }}
    secrets:
      KUBERMATIC_DOCS_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.4.0)"
        required: true
        type: string
      minor:
        description: "Minor version (e.g. v1.4)"
        required: true
        type: string
      is_patch:
        description: "Is this a patch release?"
        required: true
        type: string
        default: "true"

permissions: {}

env:
  DOCS_REPO: kubermatic/docs
  KUBELB_REPO: kubermatic/kubelb

jobs:
  update-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      pr_url: ${{ steps.create-pr.outputs.pr_url }}
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.DOCS_REPO }}
          token: ${{ secrets.KUBERMATIC_DOCS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup for minor release
        if: inputs.is_patch == 'false'
        env:
          MINOR: ${{ inputs.minor }}
        run: |
          if [ -d "content/kubelb/${MINOR}" ]; then
            echo "::notice::Version directory content/kubelb/${MINOR} already exists, skipping copy"
          else
            PREVIOUS_MINOR=$(ls -d content/kubelb/v* | sort -V | tail -1 | xargs basename)
            cp -r "content/kubelb/${PREVIOUS_MINOR}" "content/kubelb/${MINOR}"
          fi

          if ! grep -q "release: ${MINOR}" data/products.yaml; then
            sed -i "/kubelb:/,/^[a-z]/{/- release: main/{a\\
            \    - release: ${MINOR}\n      name: ${MINOR}
            }}" data/products.yaml
          fi

          # Replace with render_external_markdown shortcodes
          # Heredoc content is indented to avoid breaking YAML block scalars (issue #19)
          cat > "content/kubelb/${MINOR}/release-notes/_index.en.md" << 'RNEOF'
            +++
            title = "Release Notes"
            date = 2026-01-15T00:00:00+01:00
            weight = 60
            +++

            {{< render_external_markdown "https://raw.githubusercontent.com/KUBELB_REPO_PLACEHOLDER/refs/heads/main/docs/changelogs/CHANGELOG-MINOR_PLACEHOLDER.md" >}}
          RNEOF
          sed -i 's/^            //' "content/kubelb/${MINOR}/release-notes/_index.en.md"
          sed -i "s|KUBELB_REPO_PLACEHOLDER|${KUBELB_REPO}|g; s|MINOR_PLACEHOLDER|${MINOR}|g" \
            "content/kubelb/${MINOR}/release-notes/_index.en.md"

          cat > "content/kubelb/${MINOR}/references/ce/_index.en.md" << CEEOF
            +++
            title = "Community Edition"
            date = 2026-01-15T00:00:00+01:00
            weight = 10
            +++

            {{< render_external_markdown "https://raw.githubusercontent.com/${KUBELB_REPO}/refs/heads/release/${MINOR}/docs/generated/api-reference.md" >}}
          CEEOF
          sed -i 's/^            //' "content/kubelb/${MINOR}/references/ce/_index.en.md"

          cat > "content/kubelb/${MINOR}/references/ee/_index.en.md" << EEEOF
            +++
            title = "Enterprise Edition"
            date = 2026-01-15T00:00:00+01:00
            weight = 20
            +++

            {{< render_external_markdown "https://raw.githubusercontent.com/${KUBELB_REPO}/refs/heads/release/${MINOR}/docs/generated/api-reference-ee.md" >}}
          EEEOF
          sed -i 's/^            //' "content/kubelb/${MINOR}/references/ee/_index.en.md"

      - name: Update version strings in installation pages
        env:
          MINOR: ${{ inputs.minor }}
          VERSION: ${{ inputs.version }}
        run: |
          DOCS_DIR="content/kubelb/${MINOR}"

          PREV_VERSION=$(grep -ohE 'version=v[0-9]+\.[0-9]+\.[0-9]+' "${DOCS_DIR}/installation/management-cluster/_index.en.md" | head -1 | cut -d= -f2)

          if [ -z "$PREV_VERSION" ]; then
            echo "::warning::Could not detect previous version in docs, skipping version update"
            exit 0
          fi

          echo "Updating ${PREV_VERSION} → ${VERSION} in ${DOCS_DIR}"

          find "${DOCS_DIR}" -name "*.md" -type f | while read -r file; do
            if grep -q "${PREV_VERSION}" "$file"; then
              sed -i "s/${PREV_VERSION}/${VERSION}/g" "$file"
              echo "  Updated: $file"
            fi
          done

      - name: Replace helm values tables between marker comments
        env:
          MINOR: ${{ inputs.minor }}
          VERSION: ${{ inputs.version }}
        run: |
          DOCS_DIR="content/kubelb/${MINOR}"

          declare -A MARKERS
          MARKERS["kubelb-manager"]="docs/generated/helm-values-kubelb-manager.md"
          MARKERS["kubelb-ccm"]="docs/generated/helm-values-kubelb-ccm.md"
          MARKERS["kubelb-manager-ee"]="docs/generated/helm-values-kubelb-manager-ee.md"
          MARKERS["kubelb-ccm-ee"]="docs/generated/helm-values-kubelb-ccm-ee.md"

          for marker in "${!MARKERS[@]}"; do
            REMOTE_FILE="${MARKERS[$marker]}"
            RAW_URL="https://raw.githubusercontent.com/${KUBELB_REPO}/refs/tags/${VERSION}/${REMOTE_FILE}"
            TABLE=$(curl -sfL "$RAW_URL" || echo "")

            if [ -z "$TABLE" ]; then
              echo "::warning::Could not fetch ${REMOTE_FILE} for ${VERSION}, skipping ${marker}"
              continue
            fi

            START_MARKER="<!-- helm-values-${marker} start -->"
            END_MARKER="<!-- helm-values-${marker} end -->"

            find "${DOCS_DIR}" -name "*.md" -type f | while read -r file; do
              if grep -q "$START_MARKER" "$file"; then
                # Replace content between markers (keep markers intact)
                sed -i "/${START_MARKER}/,/${END_MARKER}/{
                  /${START_MARKER}/!{
                    /${END_MARKER}/!d
                  }
                }" "$file"
                # Insert new table after start marker
                sed -i "/${START_MARKER}/r /dev/stdin" "$file" <<< "$TABLE"
                echo "  Updated ${marker} in ${file}"
              fi
            done
          done

      - name: Create PR
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.KUBERMATIC_DOCS_TOKEN || secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          IS_PATCH: ${{ inputs.is_patch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/kubelb-${VERSION}-docs"
          git checkout -b "${BRANCH}"
          git add -A
          git commit -m "docs: update KubeLB docs for ${VERSION}" || exit 0
          git push -u origin "${BRANCH}"

          BODY="Update KubeLB documentation for release ${VERSION}."
          if [ "${IS_PATCH}" = "false" ]; then
            BODY="${BODY} Added new minor version directory and release notes."
          fi

          PR_URL=$(gh pr create \
            --repo "${{ env.DOCS_REPO }}" \
            --title "docs: update KubeLB docs for ${VERSION}" \
            --body "${BODY}")
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
