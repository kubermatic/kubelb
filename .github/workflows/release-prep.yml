name: Release Prep

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.4.0)"
        required: true
        type: string
      branch:
        description: "Target release branch (e.g. release/v1.4)"
        required: true
        type: string
      prev_tag:
        description: "Previous tag/SHA to diff against (optional; leave empty for auto-detect). Auto-detect: minors (vX.Y.0) use vX.(Y-1).0, patches use the highest ancestor tag."
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry run: bump charts and generate artifacts but skip all writes (no branch creation, no commits pushed, no PR opened)."
        required: false
        type: boolean
        default: false

permissions: {}

env:
  EE_REPO: kubermatic/kubelb-ee

jobs:
  prep:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 30
    steps:
      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected stable semver: v1.4.0, v1.4.1). Pre-releases (RC/alpha/beta) should use direct tag+push instead."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate tag doesn't exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag $VERSION already exists"
            exit 1
          fi

      - name: Ensure EE release branch exists
        env:
          GH_TOKEN: ${{ secrets.KUBELB_EE_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          MINOR=$(echo "$VERSION" | grep -oE 'v[0-9]+\.[0-9]+')
          if gh api "repos/${EE_REPO}/branches/release/${MINOR}" --jq '.name' >/dev/null 2>&1; then
            echo "::notice::EE release branch release/${MINOR} already exists"
          else
            echo "Creating EE release branch release/${MINOR} from main..."
            MAIN_SHA=$(gh api "repos/${EE_REPO}/git/ref/heads/main" --jq '.object.sha')
            gh api "repos/${EE_REPO}/git/refs" \
              -f ref="refs/heads/release/${MINOR}" \
              -f sha="$MAIN_SHA"
            echo "::notice::Created EE release branch release/${MINOR}"
          fi

      - name: Ensure CE release branch exists
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          if ! git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Creating CE release branch $BRANCH from main..."
            git checkout main
            git checkout -b "$BRANCH"
            git push origin "$BRANCH"
          else
            echo "::notice::Branch $BRANCH already exists"
          fi

      - name: Checkout release branch
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git branch --set-upstream-to="origin/$BRANCH" "$BRANCH"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v7.0.0
        with:
          version: v2.11.4
          args: --help

      - name: Install release-notes tool
        run: go install k8s.io/release/cmd/release-notes@6ba294d3b031d2b69d903a1e92ce86a695d84dbd

      - name: Bump versions
        env:
          VERSION: ${{ inputs.version }}
        run: ./hack/release/bump-versions.sh "$VERSION"

      - name: Clone and bump EE
        id: ee-clone
        env:
          KUBELB_EE_TOKEN: ${{ secrets.KUBELB_EE_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          MINOR=$(echo "$VERSION" | grep -oE 'v[0-9]+\.[0-9]+')
          git clone --branch "release/${MINOR}" \
            "https://x-access-token:${KUBELB_EE_TOKEN}@github.com/${EE_REPO}.git" /tmp/kubelb-ee
          cd /tmp/kubelb-ee
          git fetch --tags
          # Capture EE HEAD SHA at prep time. release-auto-tag pins the EE
          # tag to this exact SHA so that an EE push between prep PR creation
          # and merge cannot cause CE/EE tags to diverge from what was
          # reviewed in the prep PR.
          EE_HEAD_SHA=$(git rev-parse HEAD)
          echo "ee_head_sha=${EE_HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "::notice::EE prep SHA: ${EE_HEAD_SHA}"
          # Bump EE chart values in /tmp clone only — never committed back.
          # EE keeps its release branch values frozen at the last shipped
          # version; the bump happens transiently in CI per release.
          cd "${GITHUB_WORKSPACE}"
          ./hack/release/bump-versions.sh --target-dir /tmp/kubelb-ee "$VERSION"

      - name: Generate artifacts (CE codegen + EE docs)
        env:
          KUBELB_EE_PATH: /tmp/kubelb-ee
        run: |
          make helm-lint helm-dependency-update update-codegen
          ./hack/release/generate-docs.sh --ee-only

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.KUBELB_EE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.KUBELB_EE_TOKEN }}
          VERSION: ${{ inputs.version }}
          BRANCH: ${{ inputs.branch }}
          PREV_TAG_OVERRIDE: ${{ inputs.prev_tag }}
        run: |
          MINOR=$(echo "$VERSION" | grep -oE 'v[0-9]+\.[0-9]+')
          PREV_TAG=""
          if [ -n "$PREV_TAG_OVERRIDE" ]; then
            PREV_TAG="$PREV_TAG_OVERRIDE"
            echo "Previous tag (from input): $PREV_TAG"
          elif [[ "$VERSION" =~ ^v([0-9]+)\.([0-9]+)\.0$ ]] && [ "${BASH_REMATCH[2]}" -gt 0 ]; then
            # Minor release: use previous minor's .0 tag so notes cover the
            # full previous-minor series. Ancestor walk would pick the most
            # recent ancestor tag (e.g. v1.3.1), which truncates the range.
            CAND="v${BASH_REMATCH[1]}.$((BASH_REMATCH[2] - 1)).0"
            if git rev-parse "$CAND" > /dev/null 2>&1; then
              PREV_TAG="$CAND"
              echo "Previous tag (auto-detected for minor): $PREV_TAG"
            else
              echo "::warning::Expected previous minor tag $CAND not found; falling back to ancestor walk"
            fi
          fi
          if [ -z "$PREV_TAG" ]; then
            # Patch release (or minor fallback): highest semver tag reachable
            # from HEAD. `git log tag..HEAD` exits 0 for any range, so it
            # cannot distinguish ancestry — use merge-base --is-ancestor.
            for tag in $(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$'); do
              if git merge-base --is-ancestor "$tag" HEAD 2>/dev/null; then
                PREV_TAG="$tag"
                break
              fi
            done
            echo "Previous tag (auto-detected): ${PREV_TAG:-none}"
          fi

          if [ -n "$PREV_TAG" ]; then
            ./hack/release/generate-notes.sh "$VERSION" "$PREV_TAG" \
              --branch "$BRANCH" \
              --ee-repo "${EE_REPO}" --ee-path /tmp/kubelb-ee --ee-branch "release/${MINOR}" \
              kubermatic/kubelb
          else
            echo "::notice::No reachable previous tag found, skipping release notes generation"
          fi

      - name: Validate
        run: make lint build

      - name: Create prep branch and PR
        env:
          GH_TOKEN: ${{ secrets.KUBELB_EE_TOKEN }}
          KUBELB_EE_TOKEN: ${{ secrets.KUBELB_EE_TOKEN }}
          VERSION: ${{ inputs.version }}
          BASE_BRANCH: ${{ inputs.branch }}
        run: |
          BRANCH="chore/prepare-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          echo "::group::Debug: git status before commit"
          git diff --stat
          git status
          echo "::endgroup::"
          git add -A
          git commit -s -m "chore: prepare ${VERSION}"
          git remote set-url origin "https://x-access-token:${KUBELB_EE_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "${BRANCH}"

          MINOR=$(echo "${VERSION}" | grep -oE 'v[0-9]+\.[0-9]+')
          CHANGELOG_FILE="docs/changelogs/CHANGELOG-${MINOR}.md"
          NOTES_PREVIEW=""
          if [ -f "$CHANGELOG_FILE" ]; then
            NOTES_PREVIEW=$(head -100 "$CHANGELOG_FILE")
          fi

          gh pr create \
            --base "${BASE_BRANCH}" \
            --head "${BRANCH}" \
            --title "chore: prepare ${VERSION}" \
            --body-file - <<PREOF
          **What this PR does / why we need it**:
          Prepare release ${VERSION}. Bumps chart versions, regenerates docs, and generates release notes.

          **What type of PR is this?**
          /kind chore

          **Special notes for your reviewer**:
          - Review generated release notes below and in \`docs/changelogs/\`
          - Review generated docs (API refs, metrics, helm values)
          - Merging this PR auto-tags CE + EE repos and triggers the release pipeline

          ## Checklist
          - [ ] Chart versions bumped
          - [ ] Helm docs regenerated
          - [ ] Release notes reviewed
          - [ ] Vulnerability scan passed
          - [ ] CI green
          - [ ] Cherry-picks complete

          <!-- EE-SHA: ${{ steps.ee-clone.outputs.ee_head_sha }} -->

          <details>
          <summary><b>Release Notes Preview</b></summary>

          ${NOTES_PREVIEW}

          </details>

          \`\`\`release-note
          NONE
          \`\`\`

          \`\`\`documentation
          NONE
          \`\`\`
          PREOF

          gh pr edit "${BRANCH}" --add-label "release-note-none" 2>/dev/null || true
          gh pr edit "${BRANCH}" --add-label "kind/chore" 2>/dev/null || true
