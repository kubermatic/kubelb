name: PR Security & Compliance

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
          cd cli && govulncheck ./...

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          fail-on-scopes: runtime, development

  scan-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: kubelb
            dockerfile: kubelb.dockerfile
          - name: ccm
            dockerfile: ccm.dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build ${{ matrix.image.name }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          load: true
          tags: ${{ matrix.image.name }}:pr-scan
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=min,scope=${{ matrix.image.name }}

      - name: Scan ${{ matrix.image.name }} (table)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image.name }}:pr-scan
          exit-code: "0"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          format: "table"

      - name: Scan ${{ matrix.image.name }} (sarif)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image.name }}:pr-scan
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-${{ matrix.image.name }}.sarif"

      - name: Upload ${{ matrix.image.name }} scan results
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: ${{ matrix.image.name }}
