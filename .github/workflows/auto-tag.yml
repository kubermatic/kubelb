name: Auto Tag on Release Prep Merge

on:
  pull_request:
    types: [closed]
    branches:
      - 'release/v*'

permissions: {}

jobs:
  auto-tag:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'chore/prepare-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract version
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          # chore/prepare-v1.4.0 → v1.4.0
          VERSION="${BRANCH#chore/prepare-}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Extract minor: v1.4.0 → v1.4
          MINOR=$(echo "$VERSION" | grep -oE 'v[0-9]+\.[0-9]+')
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"

          # Detect patch: v1.4.0 ends in .0 = minor, else patch
          if [[ "$VERSION" =~ \.0$ ]]; then
            echo "is_patch=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_patch=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag CE repo
        run: |
          git tag "${{ steps.version.outputs.version }}" "${{ github.event.pull_request.merge_commit_sha }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Checkout for git operations
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Tag EE repo
        env:
          KUBELB_EE_TOKEN: ${{ secrets.KUBELB_EE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MINOR="${{ steps.version.outputs.minor }}"

          # Clone EE repo, tag its release branch HEAD
          git clone --depth 1 --branch "release/${MINOR}" \
            "https://x-access-token:${KUBELB_EE_TOKEN}@github.com/kubermatic/kubelb-ee.git" /tmp/kubelb-ee

          cd /tmp/kubelb-ee
          git tag "${VERSION}"
          git push origin "${VERSION}"

      - name: Dispatch docs update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.KUBERMATIC_DOCS_TOKEN }}
          repository: kubermatic/docs
          event-type: kubelb-release
          client-payload: >-
            {
              "version": "${{ steps.version.outputs.version }}",
              "minor": "${{ steps.version.outputs.minor }}",
              "is_patch": "${{ steps.version.outputs.is_patch }}"
            }
