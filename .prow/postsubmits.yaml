---
postsubmits:
  - name: ci-push-kubelb
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/kubelb.git"
    branches:
      - ^main
    reporter_config:
      slack:
        channel: dev-kubelb
    labels:
      preset-docker-push: "true"
      preset-goproxy: "true"
    spec:
      containers:
        - image: golang:1.26
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              VERSION=29.4.0 curl -fsSL https://get.docker.com | sh
              (dockerd --storage-driver=vfs &>/dev/null &)
              timeout 30 bash -c 'while ! docker info &>/dev/null; do sleep 0.5; done'
              docker login -u $QUAY_IO_USERNAME -p $QUAY_IO_PASSWORD quay.io
              make download-gocache docker-image-publish
          # docker-in-docker needs privileged mode
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 100m
              memory: 500m

  - name: ci-push-kubelb-upload-gocache
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/kubelb.git"
    branches:
      - ^main$
    reporter_config:
      slack:
        channel: dev-kubelb
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: golang:1.26
          command:
            - "./hack/ci/upload-gocache.sh"
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
