---
presubmits:
  - name: pull-kubelb-verify
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/kubelb.git"
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: golang:1.26
          command:
            - ./hack/ci/verify.sh
          resources:
            requests:
              memory: 2Gi
              cpu: 2

  - name: pull-kubelb-lint
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/kubelb.git"
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: golangci/golangci-lint:v2.10.1
          command:
            - bash
          args:
            - -c
            - |
              make download-gocache
              make lint
          resources:
            requests:
              cpu: 4
              memory: 6Gi

  - name: pull-kubelb-unit-tests
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/kubelb.git"
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: golang:1.26
          command:
            - bash
          args:
            - -c
            - |
              make download-gocache
              make test
          resources:
            requests:
              memory: 4Gi
              cpu: 1
            limits:
              memory: 16Gi
              cpu: 4

  - name: pull-kubelb-e2e-tests
    always_run: false
    run_if_changed: "api/|cmd/|internal/|test/e2e/|go.mod|go.sum"
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/kubelb.git"
    labels:
      preset-kind-volume-mounts: "true"
      preset-goproxy: "true"
    spec:
      containers:
        - image: quay.io/kubermatic/build:go-1.26-node-22-kind-0.31-1
          securityContext:
            privileged: true
          env:
            - name: DOCKER_IN_DOCKER_ENABLED
              value: "true"
            - name: local_ip
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          command:
            - bash
          args:
            - -c
            - |
              set -euo pipefail
              start-docker.sh
              docker load --input /kindest.tar
              make download-gocache
              make e2e-kind
          resources:
            requests:
              memory: 16Gi
              cpu: 4
            limits:
              memory: 16Gi
              cpu: 4

  - name: pull-kubelb-gorelease-verify
    run_if_changed: "^(\\.goreleaser\\.ya?ml|go\\.(mod|sum))$|Dockerfile|\\.dockerfile$"
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/kubelb.git"
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: goreleaser/goreleaser:v2.15.2
          command:
            - goreleaser
          args:
            - release
            - --snapshot
            - --clean
            - --skip=publish
            - --skip=sign
            - --skip=docker
          resources:
            requests:
              cpu: 1
