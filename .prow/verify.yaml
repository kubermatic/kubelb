---
presubmits:
  - name: pull-kubelb-verify
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/kubelb.git"
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: golang:1.26
          command:
            - ./hack/ci/verify.sh
          resources:
            requests:
              memory: 2Gi
              cpu: 2

  - name: pull-kubelb-lint
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/kubelb.git"
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: golangci/golangci-lint:v2.10.1
          command:
            - bash
          args:
            - -c
            - |
              make download-gocache
              make lint
          resources:
            requests:
              cpu: 4
              memory: 6Gi

  - name: pull-kubelb-unit-tests
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/kubelb.git"
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: golang:1.26
          command:
            - bash
          args:
            - -c
            - |
              make download-gocache
              make test
          resources:
            requests:
              memory: 4Gi
              cpu: 1
            limits:
              memory: 16Gi
              cpu: 4

  - name: pull-kubelb-e2e-tests
    always_run: false
    run_if_changed: "api/|cmd/|internal/|test/e2e/|go.mod|go.sum"
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/kubelb.git"
    labels:
      preset-kind-volume-mounts: "true"
      preset-goproxy: "true"
    spec:
      containers:
        - image: golang:1.26
          securityContext:
            privileged: true
          env:
            - name: DOCKER_IN_DOCKER_ENABLED
              value: "true"
            - name: local_ip
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          command:
            - bash
          args:
            - -c
            - |
              set -euo pipefail
              export PATH=$PATH:$(go env GOPATH)/bin

              # Install Docker
              VERSION=29.4.0 curl -fsSL https://get.docker.com | sh
              (dockerd --storage-driver=vfs &>/dev/null &)
              timeout 30 bash -c 'while ! docker info &>/dev/null; do sleep 0.5; done'

              # Install Kind, Helm, jq, kubectl
              go install sigs.k8s.io/kind@v0.31.0 &
              curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | DESIRED_VERSION=v3.17.0 bash &
              curl -fsSL -o /usr/local/bin/jq https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64 && chmod +x /usr/local/bin/jq &
              curl -fsSL -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_linux_amd64 && chmod +x /usr/local/bin/yq &
              curl -fsSL -o /usr/local/bin/kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" && chmod +x /usr/local/bin/kubectl &
              wait

              # Pull Kind node image (replaces pre-baked /kindest.tar)
              docker pull kindest/node:v1.35.0

              make download-gocache
              make e2e-kind
          resources:
            requests:
              memory: 16Gi
              cpu: 4
            limits:
              memory: 16Gi
              cpu: 4

  - name: pull-kubelb-gorelease-verify
    run_if_changed: "^(\\.goreleaser\\.ya?ml|go\\.(mod|sum))$|Dockerfile|\\.dockerfile$"
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/kubelb.git"
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: goreleaser/goreleaser:v2.15.3
          command:
            - goreleaser
          args:
            - release
            - --snapshot
            - --clean
            - --skip=publish
            - --skip=sign
            - --skip=docker
          resources:
            requests:
              cpu: 1
