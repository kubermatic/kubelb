global:
  # -- Override the registry for all images (prefix replacement).
  # When set, all supported addon images are rewritten to this registry host.
  imageRegistry: ""
  # -- Global image pull secrets propagated to supported addon charts.
  imagePullSecrets: []

# ------------------------------------------------------------
# Addons configuration
# ------------------------------------------------------------

gatewayClass:
  create: false

# ------------------------------------------------------------
# Upstream Addons configuration
# ------------------------------------------------------------

ingress-nginx:
  enabled: false

envoy-gateway:
  enabled: false

cert-manager:
  enabled: false
  crds:
    enabled: true
  config:
    apiVersion: controller.config.cert-manager.io/v1alpha1
    kind: ControllerConfiguration
    enableGatewayAPI: true

external-dns:
  enabled: false
  # do not allow any domain that are now below these base domains
  domainFilters:
    - ${DOMAIN}
  extraVolumes:
    - name: credentials
      secret:
        # NOTE: this secret is created outside of this helm chart.
        secretName: route53-credentials
  extraVolumeMounts:
    - name: credentials
      mountPath: /.aws
      readOnly: true
  env:
    - name: AWS_SHARED_CREDENTIALS_FILE
      value: /.aws/credentials
  txtOwnerId: kubelb-management
  registry: txt
  provider: aws
  policy: sync
  sources:
    - service
    - ingress
    - gateway-httproute
    - gateway-grpcroute
    - gateway-tlsroute
    - gateway-tcproute
    - gateway-udproute
metallb:
  enabled: false

## Agentgateway Integration
## Agentgateway CRDs
agentgateway-crds:
  enabled: false

## Agentgateway
agentgateway:
  enabled: false

## Valkey: counter store for the Envoy global rate-limit service. Single
## instance, no persistence: counters are TTL'd increments, loss on restart
## means one window of overcounting at worst.
valkey:
  enabled: false

## Envoy global rate limit service (RLS): shared-counter enforcement for
## agentgateway global rate-limit policies. Requires valkey (or an external
## Redis-protocol endpoint via ratelimit.redis.url).
ratelimit:
  enabled: false

aiRecordingRules:
  # -- Render the AI usage recording rules.
  enabled: false
  # -- Evaluation interval for the rule group.
  interval: 1m
  prometheusRule:
    # -- Render a monitoring.coreos.com/v1 PrometheusRule (requires the
    # prometheus-operator CRDs in the cluster).
    enabled: true
    # -- Extra labels for the PrometheusRule, e.g. a `release` label matching
    # the operator's ruleSelector.
    labels: {}
  configMap:
    # -- Render the same rule file into a plain ConfigMap for vanilla
    # Prometheus (mount it and list it under rule_files).
    enabled: false
